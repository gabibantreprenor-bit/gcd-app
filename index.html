nivel individual sau organiza\u021bional.\n\nScopul acestor sesiuni este de a-i ajuta pe membrii comunit\u0103\u021bii s\u0103 \u00ee\u0219i g\u0103seasc\u0103 un echilibru interior, s\u0103 tr\u0103iasc\u0103 \u00een armonie cu propriile dorin\u021be \u0219i s\u0103 \u00ee\u0219i ating\u0103 poten\u021bialul. Vom explora \u00eempreun\u0103 modul \u00een care g\u00e2ndirea ne influen\u021beaz\u0103 starea de bine \u0219i vom \u00een\u021belege cum putem transforma fericirea \u00eentr-un proces con\u0219tient \u0219i accesibil. Vom discuta despre rela\u021bii \u2013 fie ele de familie, prietenie sau profesionale, despre importan\u021ba pasiunilor \u0219i a dezvolt\u0103rii personale, despre cum mi\u0219carea \u0219i obiceiurile s\u0103n\u0103toase influen\u021beaz\u0103 fericirea. Vom aborda \u0219i aspecte mai profunde, precum felul \u00een care g\u00e2ndirea ne poate apropia sau \u00eendep\u0103rta de \u00eemplinire, dar \u0219i metode matematice de analiz\u0103 \u0219i \u00een\u021belegere a acestui concept.\n\n\u00cenregistr\u0103ri Clase Online","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67cd65f4dccbc_95.png"]},"7323687":{"d":"Ofelia Ileana Cucu: Prezentare personal\u0103\n\nBine v\u0103 g\u0103sesc sau v\u0103 reg\u0103sesc, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Ofelia-Ileana Cucu \u0219i sunt entuziasmat\u0103 s\u0103 m\u0103 al\u0103tur vou\u0103 pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een diverse terapii energetice \u0219i spirituale, dedicate cre\u0219terii noastre interioare.\n\nAm o experienta de mai bine de 5 ani in lucrul cu oamenii. Am sustinut \u00een dezvoltarea lor, mii de oameni, atat prin sesiuni 1 la 1 dar si in intalniri de grup. Colaborez \u0219i cu companii, atat din Romania cat si din strainanate.\n\nPasiunea mea este de a sustine cat mai multi oameni in procesul de expansiune a constiintei \u0219i de crestere interioara.\n\n\u00cen cadrul acestui proiect voi preda despre lucrurile mai putin \"vazute\" in lumea fizica dar care , de fapt, ne influenteaza major viata, alegerile, actiunile si ceea ce manifestam si traim. Vom porni de la mintea constienta si subconstienta, undele cerebrale, corpurile noastre subtile, centrii energetici, emotii & sentimente, convingeri, manifestari in plan fizic, forme de terapii holistice si abia dac\u0103 am zgariat suprafata. Scopul tuturor aceste teme este sa aduca la suprafata lucruri nestiute, nebanuite din subconstient care te impiedica sa manifesti viata pe care ti-o doresti si care iti este menita.\n\n\u00cen plus, m\u0103 voi concentra pe a te sus\u021bine \u00een cre\u0219terea \u00eencrederii \u00een sine, atingerea echilibrul interior \u0219i dep\u0103\u0219irea blocajele care te \u00eempiedic\u0103 s\u0103 tr\u0103ie\u0219ti via\u021ba pe care \u021bi-o dore\u0219ti.\n\nSunt foarte \u00eenc\u00e2ntat\u0103 \u0219i entuziasmat\u0103 de aceast\u0103 calatorie de crestere \u00eempreun\u0103 \u0219i de \u0219ansa de a contribui la cre\u0219terea \u0219i dezvoltarea acestei comunit\u0103\u021bi.\n\nV\u0103 \u00eencurajez s\u0103 lua\u021bi parte activ\u0103 la \u00eent\u00e2lniri, s\u0103 adresa\u021bi \u00eentreb\u0103ri \u0219i s\u0103 v\u0103 implica\u021bi pe deplin. \u00cen acest mod v\u0103 pot sus\u021bine cel mai bine \u0219i putem contribui la dezvoltarea \u00eentregii comunit\u0103\u021bi.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne cunoa\u0219tem!\n\n\u00cenregistr\u0103ri Clase\nDate de Contact","c":{"fb":"ofelia.cucu","web":"ofeliaileana.com","wa":"+436644748356"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/6761bdf692b16_OfeliaCucu.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323688":{"d":"Ioana Mari\u0219: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nM\u0103 numesc Mari\u015f Ioana \u0219i sunt onorat\u0103 s\u0103 fac parte din aceast\u0103 comunitate extraordinar\u0103, unde \u00eemp\u0103rt\u0103\u0219irea cuno\u0219tin\u021belor \u0219i dezvoltarea personal\u0103 sunt priorit\u0103\u021bi esen\u021biale.\n\nDe peste 3 ani, pasiunea mea pentru feminitate, copilul interior, regresii \u0219i hipnoz\u0103 s-a transformat \u00eentr-o misiune: s\u0103 ajut oamenii s\u0103 se conecteze cu adev\u0103rata lor esen\u021b\u0103. \u00cen acest timp, am avut privilegiul de a ghida sute de femei prin \u00eent\u00e2lniri individuale, cursuri transformative \u0219i retreaturi dedicate feminit\u0103\u021bii.\n\nCe voi aduce comunit\u0103\u021bii noastre?\n\nPrin acest proiect, voi sus\u021bine cursuri \u0219i sesiuni dedicate subiectelor esen\u021biale precum:\n\n- Vindecarea p\u00e2ntecului \u2013 o reconectare profund\u0103 cu energia creativ\u0103 \u0219i feminin\u0103.\n\n- Magia Feminit\u0103\u021bii \u2013 explorarea arhetipurilor feminine, vindecarea r\u0103nilor emo\u021bionale \u0219i descoperirea puterii interioare.\n\n- Reconectarea cu energia feminin\u0103 r\u0103nit\u0103 \u2013 cum s\u0103 transform\u0103m vulnerabilitatea \u00een putere \u0219i autenticitate.\n\nFiecare sesiune va fi conceput\u0103 s\u0103 v\u0103 sprijine \u00een:\n\n- Reg\u0103sirea bucuriei de a tr\u0103i.\n\n- Cre\u0219terea \u00eencrederii \u00een sine.\n\n- Dezvoltarea abilit\u0103\u021bilor \u0219i \u00eenv\u0103\u021barea de tehnici noi pentru o via\u021b\u0103 \u00eemplinit\u0103.\n\nCe v\u0103 a\u0219teapt\u0103?\n\nUn spa\u021biu sigur, plin de energie pozitiv\u0103, unde s\u0103 explor\u0103m \u00eempreun\u0103 r\u0103spunsuri, s\u0103 adres\u0103m \u00eentreb\u0103ri \u0219i s\u0103 ne inspir\u0103m unii pe al\u021bii.\n\nSunt entuziasmat\u0103 de oportunitatea de a colabora cu voi \u0219i de a contribui la cre\u0219terea acestei comunit\u0103\u021bi! V\u0103 invit cu drag s\u0103 participa\u021bi la cursuri, s\u0103 v\u0103 aduce\u021bi curiozitatea \u0219i \u00eentreb\u0103rile, \u0219i s\u0103 pornim \u00eempreun\u0103 \u00eentr-o c\u0103l\u0103torie de transformare \u0219i vindecare.\n\nV\u0103 mul\u021bumesc pentru \u00eencredere \u0219i abia a\u0219tept s\u0103 ne cunoa\u0219tem!\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri clase online 2025\n\u00cenregistr\u0103ri clase online 2026\nMateriale Utile\nMedita\u021bie de Binecuv\u00e2ntare a P\u00e2ntecului\nMedita\u021bie Cur\u0103\u021bare P\u00e2ntec\nMedita\u021bie de Vindecare a P\u00e2ntecului\nTransform\u0103-\u021bi Via\u021ba prin Vindecarea P\u00e2ntecului\nDate de Contact","c":{"web":"marisioana.com","fb":"petrovan.ioana.7","ig":"ioana.petrovan","tt":"maris.ioana","wa":"+330634423405"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/676fc49180c8e_IoanaMaris.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe1e2fee_5.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323689":{"d":"Despina Ungureanu: Prezentare personal\u0103\n\nBun\u0103 suflete minunate, membri ai comunit\u0103\u0163ii G\u00e2nde\u015fte & C\u00e2stig\u0103 Diferit!\n\nNumele meu este Despina Ungureanu \u015fi sunt \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u0163ii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u015ftin\u0163ele \u015fi experien\u0163a mea \u00een vindecarea emo\u0163ional\u0103 \u015fi cur\u0103\u0163area energetic\u0103.\n\nAveam o v\u00eca\u0163a normal\u0101 \u00een care aveam afacerea mea, casa, familie \u015fi acum 12 ani au ap\u0103rut provoc\u0103ri \u00een toate aspectele vie\u0163ii mele. Suferin\u0163a a fost profund\u0103 \u015fi a fost necesar s\u0103 fac alegeri care mi-au adus \u015fi mai mult\u0103 suferin\u0163\u0103.\n\nAm \u00eenceput s\u0103-mi pun multe \u00eentreb\u0103ri.\n\nDup\u0103 multe \u00eentreb\u0103ri care mi le-am pus ani de zile am descoperit secretele care au condus la schimbarea stilului meu via\u0163a din toate perspectivele si aspectele vie\u0163ii.\n\n\u00cel c\u0103ut\u0103m pe Dumnezeu ne\u00eencetat, c\u0103ut\u0103m r\u0103spunsuri peste tot \u00een exterior \u015fi nu \u00een interiorul meu.\n\nAm \u00eenceput s\u0103 progresez pe cale cunoa\u015fterii, s\u0103 m\u0103 descop\u0103r \u015fi s\u0103 m\u0103 vindec \u015fi s\u0103-mi vindec karma.\n\nAm \u00een\u021beles c\u0103 eu eram responsabil\u0103 de via\u0163a mea \u015fi de experien\u0163ele tr\u0103ite \u00een urma cursului de vindecare a karmei.\n\nApoi am f\u0103cut cursul de consilier spiritual \u015fi totu\u015fi sim\u0163eam c\u0103 nu e suficient, bine\u00een\u021beles c\u0103 asta venea din credin\u0163a c\u0103 nu sunt suficient de bun\u0103.\n\nApoi am fost student\u0103 \u00een \u015ecoala de terapeu\u0163i, fondat\u0103 de mentorul meu Gena Rusu, nivel baz\u0103 \u015fi nivel avansa\u0163i.\n\nAcolo am practicat tehnici de vindecare \u015fi de eliberare emo\u0163ional\u0103 c\u00e2t \u015fi de cur\u0103\u021bare energetic\u0103,\n\nAm studiat metafizica chinez\u0103 tradi\u0163ional\u0103, astrologia chinez\u0103 - coloanele destinului,\n\n\u015ei Feng Shui tradi\u0163ional care se ocup\u0103 de energiile exterioare.\n\nPe m\u0103sur\u0103 ce m\u0103 vindecam sim\u021beam mult mai profund acel sentiment de a practica \u015fi de a da mai departe metodele \u015fi tehnicile care au func\u0163ionat la mine \u015fi au condus la vindecarea \u015fi transformarea mea.\n\nAm o experien\u0163\u0103 de aproape 5 ani \u00een domeniul de terapeut \u015fi am avut ocazia s\u0103 lucrez unu la unu cu peste 1000 de persoane care au avut rezultate minunate, au dob\u00e2ndit o \u00een\u0163elegere mult mai complex\u0103 despre ceea ce ei sunt \u015fi poten\u0163ialul lor.\n\nOamenii \u00ee\u015fi redob\u00e2ndesc puterea de a creea devenind con\u015ftien\u0163i de puterea lor interioar\u0103.\n\n\u015ei au posibilitatea de a \u00ee\u015fi construi via\u0163a \u015fi de a \u00ee\u015fi \u00eembun\u0103t\u00e1\u0163ii destinul.\n\nDe-a lungul carierei mele am dezvoltat o pasiune profund\u0103 pentru terapia de vindecare emo\u0163ional\u0103 \u015fi de cur\u0103\u021bare energetic\u0103 \u015fi cred cu t\u0103rie c\u0103 \u00eenv\u0103\u0163area continu\u0103 \u015fi practicarea constant\u0103 este cheia succesului.\n\n\u00cen cadrul acestui proiect voi face sesiuni de cur\u0103\u021bare energetic\u0103, de identificare a emo\u0163iilor negative captive, identificarea convingerilor limitative \u015fi a programelor mentale limitative \u015fi eliberarea lor.\n\nAceste sesiuni vor fi concepute pentru a \u00eendruma \u015fi ghida membrii comunit\u0103\u0163ii c\u0103tre ei, c\u0103tre interiorul lor s\u0103 se cunoasc\u0103 pe ei,\n\nS\u0103 \u00ee\u015fi echilibreze \u015fi s\u0103 \u00ef\u015fi \u00eembun\u0103t\u0103\u0163easc\u0103 rela\u021bia cu ei \u00eens\u0103\u015fi pentru a avea transform\u0103ri \u00een toate aspectele vie\u0163ii lor.\n\nVa accesa energia iubirii de sine, a stime de sine \u00eenalt\u0103 ie\u015find din critic\u0103 \u015fi din judecat\u0103,din furie \u015fi ur\u0103, etc.\n\nVoi aborda subiecte precum:\n\n- cum s\u0103 accesezi starea de bine,\n\n- cum s\u0103 te eliberezi de frici ca s\u0103 \u00ee\u0163i cre\u015fti starea de bine,\n\n- cum s\u0103 integrezi iubirea de sine \u015fi ce este iubirea de sine,\n\n- despre r\u0103nile emo\u0163ionale,\n\n- despre centri energetici\n\n- \u0219i multe alte subiecte...\n\nSunt ner\u0103bd\u0103toare s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de eliberare \u015fi de transformare.\n\nSunt foarte recunosc\u0103toare de aceast\u0103 oportunitate de a colabora cu voi \u015fi de a contribui la dezvoltarea comunit\u0103\u0163ii noastre.\n\nV\u0103 invit s\u0103 v\u0103 al\u0103tura\u0163i cursurilor noastre \u015fi s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri deoarece interac\u021biunea este cheia \u00eenv\u0103\u0163\u0103rii.\n\nV\u0103 mul\u0163umesc \u015fi abia a\u015ftept s\u0103 ne \u00eent\u00e2lnim!\n\nCu iubire,\n\nDespina \u2764\ufe0f\n\n\u00cenregistr\u0103ri Clase Online\nDate de Contact","c":{"fb":"profile.php","wa":"+3281463371"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/6762bae237cfa_DespinaUngureanufinal.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323690":{"d":"Maia Florica Trandafirescu: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\n\u0218tim cu to\u021bii c\u0103 compasiunea transform\u0103 durerea \u00een iubire \u0219i creeaz\u0103 pun\u021bi \u00eentre inimile noastre.\n\nM\u0103 numesc Maia Florica Trandafirescu \u0219i sunt \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur acestei minunate comunit\u0103\u021bi pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een domeniul dezvolt\u0103rii personale \u0219i spirituale.\n\nActivez ca:\n\nEnergo-psiho-terapeut,\n\nMentor Coach,\n\nFormator,\n\nConsilier pentru dezvoltare personal\u0103,\n\nAntrenor \u00een respira\u021bia con\u0219tient\u0103,\n\nTerapeut holistic.\n\nAm o experien\u021b\u0103 de peste 25 de ani \u00een domeniul dezvolt\u0103rii personale. Pe parcursul acestei c\u0103l\u0103torii, am avut parte de provoc\u0103ri \u0219i de momente de \u00eenv\u0103\u021bare profund\u0103, care m-au ghidat cu succes prin practici religioase \u0219i spirituale, ar\u0103t\u00e2ndu-mi calea spre voca\u021bia mea.\n\nSunt absolvent\u0103 a:\n\nAcademiei Psy Development,\n\n\u0218colii de Respira\u021bie Con\u0219tient\u0103,\n\n\u0218colii de Extrasenzori.\n\nAm urmat \u0219i alte cursuri care \u00eembog\u0103\u021besc profesia mea holistic\u0103. De asemenea, sunt licen\u021biat\u0103 \u00een drept \u0219i masterand\u0103 \u00een \u201eMedierea conflictelor juridice\u201d.\n\n\u00cen activitatea mea, m-am concentrat pe \u00een\u021belegerea conflictelor la toate nivelurile \u2013 interior, exterior \u0219i spiritual \u2013 \u0219i pe g\u0103sirea de solu\u021bii care s\u0103 aduc\u0103 armonie \u0219i pace.\n\nPrin cursurile de extrasenzori, am dezvoltat capacit\u0103\u021bi precum clar-intui\u021bia, pe care le-am perfec\u021bionat studiind Hermetismul \u00een cadrul Academiei Psy Development. Aplic metode de cunoa\u0219tere intuitiv\u0103, similare clarviziunii.\n\nPasiunea mea pentru comunicare m-a ajutat s\u0103 transmit cunoa\u0219terea \u00eentr-un mod simplu \u0219i accesibil, indiferent de nivelul de preg\u0103tire sau credin\u021be. \u00cei ajut pe cursan\u021bi s\u0103-\u0219i descopere \u0219i s\u0103-\u0219i valorifice poten\u021bialul personal, f\u0103r\u0103 a crea ata\u0219amente fa\u021b\u0103 de mine, ci oferindu-le instrumentele necesare pentru transformare.\n\nDe-a lungul carierei mele, am sus\u021binut cursuri precum:\n\nTrezirea inimii iluminate (ATIH),\n\nRespira\u021bia con\u0219tient\u0103 pe \u00een\u021belesul tuturor,\n\nAutocunoa\u0219tere prin analiza g\u00e2ndurilor, sentimentelor \u0219i emo\u021biilor (GANSENE).\n\nAm folosit tehnici inovatoare, precum respira\u021bia con\u0219tient\u0103 \u00een ap\u0103 s\u0103rat\u0103, care ajut\u0103 la eliberarea rapid\u0103 a traumelor. \u00centr-o singur\u0103 \u0219edin\u021b\u0103 de o or\u0103, cursan\u021bii pot ob\u021bine beneficii echivalente cu 10 \u0219edin\u021be tradi\u021bionale de terapie.\n\n\u00cen 2012, am fondat \u0218coala C.A.I.A. (Calea Armoniei Interioare Accelerate), care promoveaz\u0103 dezvoltarea personal\u0103 holistic\u0103 \u0219i ofer\u0103 cursuri practice, accesibile tuturor.\n\nPrintre cursurile mele se num\u0103r\u0103:\n\nMedierea conflictelor interioare \u0219i exterioare,\n\nRespir\u0103 pur \u0219i simplu, dar con\u0219tient,\n\nCum s\u0103 devii con\u0219tient de prezent folosind tehnica triunghiurilor,\n\nDe la logic\u0103 la inspira\u021bie.\n\nPentru o colaborare eficient\u0103, creez \u0219i Cosmograma Maya\u0219\u0103, ajut\u00e2nd fiecare student s\u0103-\u0219i direc\u021bioneze pa\u0219ii \u00een via\u021b\u0103. De asemenea, ofer o scurt\u0103 introducere \u00een Profilul Hologenetic.\n\nCred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea \u0219i practica con\u0219tient\u0103 sunt cheia succesului. Transform durerea \u00een iubire de sine \u0219i creez pun\u021bi \u00eentre oameni \u2013 aceasta este voca\u021bia mea!\n\nProiectele mele pentru 2025 includ:\n\nContinuarea pred\u0103rii cuno\u0219tin\u021belor dob\u00e2ndite,\n\nColabor\u0103ri voluntare cu grupuri de copii \u0219colari, folosind pove\u0219ti inspira\u021bionale pentru a le contura o traiectorie mental\u0103 s\u0103n\u0103toas\u0103.\n\nCursurile mele pentru comunitate se axeaz\u0103 pe:\n\nTehnici de respira\u021bie pentru dep\u0103\u0219irea fricilor \u0219i blocajelor emo\u021bionale,\n\nDezvoltarea curajului \u0219i a ra\u021biunii \u00een situa\u021bii dificile,\n\nOb\u021binerea p\u0103cii interioare \u0219i a bucuriei,\n\nTransformarea vibra\u021biei luptei \u00een vibra\u021bia bucuriei,\n\nStudiul dialogului interior ca baz\u0103 pentru manifestarea \u00een\u021belepciunii.\n\nBeneficii pentru membrii comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit:\n\n- Descoperirea valorii de sine prin autocunoa\u0219tere \u0219i adaptare.\n\n- Evolu\u021bia con\u0219tiin\u021bei, conform h\u0103r\u021bii nivelurilor de con\u0219tiin\u021b\u0103 ale lui David Hawkins.\n\n- Dezvoltarea abilit\u0103\u021bilor de a aborda via\u021ba dintr-o perspectiv\u0103 nou\u0103 \u0219i \u00een\u021beleapt\u0103.\n\n- Cre\u0219terea eficien\u021bei \u0219i siguran\u021bei \u00een ac\u021biuni.\n\n\u00cen concluzie: Te invit s\u0103 m\u0103 urm\u0103re\u0219ti \u0219i s\u0103 participi la cursurile mele, dac\u0103 sim\u021bi c\u0103 aceasta este calea potrivit\u0103 pentru tine. Sunt aici, preg\u0103tit\u0103 s\u0103 \u00eemp\u0103rt\u0103\u0219esc din cuno\u0219tin\u021bele mele \u0219i s\u0103 te ghidez cu c\u0103ldur\u0103 \u00een aceast\u0103 c\u0103l\u0103torie transformatoare.\n\nV\u0103 mul\u021bumesc \u0219i a\u0219tept cu bucurie s\u0103 ne \u00eent\u00e2lnim!\n\nCu recuno\u0219tin\u021b\u0103, Maia Florica Trandafirescu\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/6792a7b3ee4c5_17.png"]},"7323692":{"d":"Elena Bucur: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nM\u0103 bucur c\u0103 v-am \u00eent\u00e2lnit, voi sunte\u021bi r\u0103spunsul la cererea pe care am lansat-o \u00een univers \u2013 de a \u00eent\u00e2lni oameni valoro\u0219i care caut\u0103 lumina, iubirea, adev\u0103rul \u0219i evolu\u021bia.\n\nNumele meu este Bucur Elena \u0219i sunt \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een domeniul Terapiilor Spirituale.\n\nAm o experien\u021b\u0103 de 15 ani \u00een terapii energetice \u0219i am lucrat \u00een cadrul cabinetului \u201eIubirea Mamei,\u201d fie individual, fie al\u0103turi de al\u021bi terapeu\u021bi, \u00een func\u021bie de terapia oferit\u0103. Sunt profund recunosc\u0103toare fiin\u021belor de lumin\u0103 (\u00eencarnate sau nu) pentru \u00eenv\u0103\u021b\u0103turile primite, dar \u0219i tuturor pacien\u021bilor mei \u2013 am crescut \u00eempreun\u0103.\n\nDe-a lungul timpului, am utilizat tehnici precum:\n\nConstela\u021bii Spirituale\n\nAccess Bars\n\nTheta Healing\n\nLucrul cu Copilul Interior\n\nTransformarea Traumelor \u00een Iubire\n\nScopul meu: trezirea con\u0219tiin\u021bei \u0219i activarea for\u021belor interioare din fiecare fiin\u021b\u0103.\n\n\u00cen cadrul acestui proiect, voi ghida sesiuni prin medita\u021bii profunde, utiliz\u00e2nd informa\u021biile primite din c\u0103l\u0103toriile astrale \u0219i \u00eenv\u0103\u021b\u0103turile fiin\u021belor de lumin\u0103 din planuri superioare. Aceste sesiuni sunt g\u00e2ndite pentru a ajuta membrii s\u0103:\n\nDescopere for\u021ba interioar\u0103\n\nDea sens propriei vie\u021bi\n\n\u00cen\u021beleag\u0103 structura complet\u0103 a fiin\u021bei umane: eul uman \u0219i eul divin\n\n\u00cempreun\u0103 vom explora r\u0103spunsurile la \u00eentreb\u0103ri fundamentale:\n\n- Cine sunt?\n\n- De unde vin?\n\n- De ce am venit?\n\n- Care sunt darurile mele (talan\u021bii)?\n\n- Cum \u00eemi pot manifesta geniul?\n\n- Cum pot transforma sl\u0103biciunile \u00een virtu\u021bi?\n\n- Cum pot transforma o traum\u0103 \u00een iubire?\n\nSunt ner\u0103bd\u0103toare s\u0103 descoperim \u00eempreun\u0103 lumina, puritatea, frumuse\u021bea \u0219i puterea de creator a fiec\u0103ruia dintre noi.\n\nCu recuno\u0219tin\u021b\u0103, Elena Bucur \u2013 Terapeut Spiritual\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026\nDate de Contact","c":{"fb":"bucur.elena.52","wa":"+40722320290"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/677703e2156c4_32.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323695":{"d":"T\u00fcnde M\u00e1rton: Prezentare personal\u0103\n\nBun\u0103 \u0219i bine v-am g\u0103sit, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te, Tr\u0103ie\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este T\u00fcnde M\u00e1rton, Astrolog specializat \u00een Astrologia European\u0103 \u0219i Japonez\u0103, iar ast\u0103zi sunt onorat\u0103 s\u0103 m\u0103 al\u0103tur acestei comunit\u0103\u021bi extraordinare pentru a \u00eemp\u0103rt\u0103\u0219i cu voi \u00een\u021belepciunea \u0219i cuno\u0219tin\u021bele mele \u00een arta astrologiei \u0219i \u00een puterea transform\u0103rii spirituale.\n\nDe-a lungul carierei, am avut privilegiul de a ajuta sute de suflete s\u0103-\u0219i descopere calea personal\u0103 \u0219i s\u0103-\u0219i alinieze energiile cu ritmurile Universului. Prin interpretarea h\u0103r\u021bilor natale, am ghidat oamenii s\u0103-\u0219i \u00eembr\u0103\u021bi\u0219eze destinul cu \u00eencredere, oferindu-le instrumentele necesare pentru a-\u0219i crea via\u021ba pe care o merit\u0103.\n\nCe vei descoperi \u00een cadrul sesiunilor: - Voi sus\u021bine sesiuni captivante despre Astrologie \u0219i Transformare Interioar\u0103, create pentru a te ajuta s\u0103-\u021bi explorezi poten\u021bialul maxim \u0219i s\u0103 faci alegeri con\u0219tiente, \u00een armonie cu energiile cosmice.\n\nSubiectele pe care le vom explora \u00eempreun\u0103:\n\n- Descoperirea talentelor ascunse din harta natal\u0103.\n\n- Utilizarea tranzitelor planetare pentru a-\u021bi planifica via\u021ba cu \u00een\u021belepciune.\n\n- Dezvoltarea unei mentalit\u0103\u021bi echilibrate prin astrologie.\n\n- Eliberarea de blocaje emo\u021bionale \u0219i atragerea abunden\u021bei.\n\n- Conectarea la ritmurile Lunii pentru transform\u0103ri profunde.\n\n- Descoperirea \u0219i \u00een\u021belegerea Misiunii sufletului.\n\nVoi fi al\u0103turi de tine, pas cu pas, \u00een aceast\u0103 c\u0103l\u0103torie magic\u0103 de redescoperire \u0219i cre\u0219tere personal\u0103. Cred cu t\u0103rie c\u0103 fiecare dintre noi are puterea de a deveni o versiune mai bun\u0103 a propriei persoane, iar astrologia este instrumentul perfect pentru aceast\u0103 transformare.\n\nTe invit s\u0103 te al\u0103turi programului nostru \u0219i s\u0103 vii cu \u00eentreb\u0103ri, pentru c\u0103 dialogul \u0219i deschiderea sunt esen\u021biale pentru evolu\u021bie.\n\nMul\u021bumesc pentru aceast\u0103 oportunitate minunat\u0103 \u0219i abia a\u0219tept s\u0103 ne cunoa\u0219tem!\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026\nMateriale Utile\nHarta Astrologic\u0103\ncompleteaz\u0103 formularul\nDate de Contact","c":{"fb":"marton.tunde.92","ig":"astrolog_tunde","wa":"+40728394205"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/6777075b6cda9_29.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323698":{"d":"Ramona Letea: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Ramona Letea \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een a g\u0103si echilibrul \u0219i armonia \u00eentre minte, corp \u0219i suflet, chiar \u00een mijlocul haosului zilnic.\n\nSunt coach sistemic \u0219i facilitator de constela\u021bii familiale, iar \u00een abordarea mea, at\u00e2t \u00een programele individuale, c\u00e2t \u0219i \u00een cele de grup, integrez:\n\nCoaching, NLP \u0219i metoda Demartini \u2013 pentru a ghida \u0219i sprijini oamenii \u00een atingerea obiectivelor, identificarea \u0219i dep\u0103\u0219irea barierelor personale \u0219i profesionale. Aceste instrumente practice ajut\u0103 la schimbarea g\u00e2ndurilor \u0219i comportamentelor care duc la epuizare, cople\u0219eal\u0103 sau chiar burnout.\n\nConstela\u021bii sistemice interioare \u2013 lucr\u0103m cu p\u0103r\u021bile interioare protectoare \u0219i r\u0103nite, precum \u0219i cu emo\u021biile pe care adesea le reprim\u0103m, dar care reapar mai amplificate.\n\nConstela\u021bii cu inten\u021bie \u0219i familiale \u2013 pentru a descoperi adev\u0103rurile pe care sufletul nostru le \u0219tie deja, dar pe care mintea le saboteaz\u0103 pentru a ne proteja.\n\nDup\u0103 ani de studiu, practic\u0103 \u0219i lucru cu clien\u021bii, am ajuns la concluzia c\u0103 cea mai bun\u0103 decizie pe care o po\u021bi lua este s\u0103 ie\u0219i din rolul de victim\u0103 a trecutului. Astfel, \u00ee\u021bi po\u021bi accesa puterea personal\u0103, te po\u021bi bucura de prezent \u0219i \u00ee\u021bi po\u021bi crea viitorul pe care \u00eel dore\u0219ti.\n\n\u00cen cadrul acestui proiect Voi contribui cu ateliere dedicate alinierii dintre minte, corp \u0219i suflet, sprijinindu-v\u0103 s\u0103 renun\u021ba\u021bi la sacrificiul de sine \u0219i frustrare pentru a tr\u0103i o via\u021b\u0103 \u00een echilibru \u0219i armonie, at\u00e2t cu voi \u00een\u0219iv\u0103, c\u00e2t \u0219i cu cei din jur.\n\nVoi aborda subiecte precum:\n\n- Cum s\u0103 g\u0103se\u0219ti armonia \u00eentre minte, corp \u0219i suflet \u00een mijlocul haosului zilnic.\n\n- Cum s\u0103 te conectezi cu corpul \u0219i s\u0103-i ascul\u021bi mesajele.\n\n- Cum s\u0103 aju\u021bi copilul interior s\u0103 creasc\u0103 adult.\n\n- Cum s\u0103 ie\u0219i din cercurile vicioase care te \u021bin blocat, pentru a te sim\u021bi \u00eemplinit \u0219i a-\u021bi manifesta poten\u021bialul.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre.\n\nV\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online\nMateriale Utile\nC\u00e2t de puternici sunt criticii t\u0103i interiori?\nDate de Contact","c":{"fb":"ramonamaria.letea.1","ig":"ramona.letea","wa":"+40722878730"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/6786295a5a6b0_46.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323699":{"d":"Marioara Laz\u0103r: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Marioara Laz\u0103r \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur acestei comunit\u0103\u021bi pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea ca Health Coach, Terapeut Theta Healing, Hipnoterapeut \u0219i Practician B&H3.\n\nAm o experien\u021b\u0103 de 3 ani \u00een hipnoz\u0103 \u0219i am avut oportunitatea de a absolvi Academia de Coaching condus\u0103 de Alina \u0218u\u021bu. \u00cen prezent, colaborez cu Puterea Min\u021bii. De-a lungul carierei mele, am dezvoltat o pasiune profund\u0103 pentru hipnoz\u0103 \u0219i autohipnoz\u0103 \u2013 o form\u0103 mai profund\u0103 de medita\u021bie pentru relaxare.\n\nCred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului, iar aceast\u0103 convingere m-a motivat s\u0103 \u00eemi continui educa\u021bia. Dup\u0103 ce am studiat Managementul Afacerilor \u00een Rom\u00e2nia, acum m\u0103 aflu \u00een anul 2 la Health, Social & Care (Psihologie) \u00een Anglia.\n\nCe voi preda \u00een cadrul sesiunilor mele?\n\nSubiectele abordate vor include:\n\nHipnoza \u0219i autohipnoza;\n\nRegresia \u00een via\u021ba curent\u0103;\n\nArmonizarea p\u0103r\u021bilor de suflet;\n\nIntegrarea copilului interior;\n\nRegresia \u00een vie\u021bile anterioare;\n\nRegresia \u00een via\u021ba dintre vie\u021bi;\n\nConexiunea cu flac\u0103ra violet \u2013 Maestrul Saint Germain.\n\nObiectivele proiectului\n\n\u00cen cadrul acestui proiect, voi preda ce este hipnoza \u0219i cum ne poate ajuta, precum \u0219i medita\u021bii de relaxare. Sesiunile vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103 lucreze cu propriile frici \u0219i traume, s\u0103 exploreze iertarea, s\u0103 gestioneze anxietatea, durerile \u0219i s\u0103-\u0219i \u00eembun\u0103t\u0103\u021beasc\u0103 s\u0103n\u0103tatea.\n\nVom explora teme precum:\n\nCopilul interior;\n\nIertarea \u0219i iubirea;\n\nFlac\u0103ra violet;\n\nKarma.\n\nC\u0103r\u021bi publicate \u0219i tehnici utilizate\n\nAm scris \u0219i publicat pe Amazon:\n\n- Agenda despre S\u0103n\u0103tate \u2013 Ghidul t\u0103u pentru un sezon f\u0103r\u0103 stres: echilibrul s\u0103n\u0103t\u0103\u021bii \u0219i gestion\u0103rii emo\u021biilor;\n\n- Jurnal \u2013 C\u0103l\u0103toria spre s\u0103n\u0103tate \u0219i echilibru.\n\nAceste materiale includ tehnici Theta Healing, afirma\u021bii de recuno\u0219tin\u021b\u0103 \u0219i medita\u021bii menite s\u0103 inspire o stare de s\u0103n\u0103tate radiant\u0103.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 participa\u021bi la cursuri, s\u0103 adresa\u021bi \u00eentreb\u0103ri \u0219i s\u0103 experiment\u0103m \u00eempreun\u0103 metodele propuse.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim! \ud83d\ude0a\n\n\u00cenregistr\u0103ri Clase Online\nDate de Contact","c":{"fb":"lazar.mariana123","wa":"+447741279146"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/678d4fbaccd72_53.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png"]},"7323702":{"d":"Bianca Pavel: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Bianca Pavel \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een terapia cuantic\u0103 \u0219i procesul manifest\u0103rii.\n\nAm o experien\u021b\u0103 de 5 ani \u00een domeniul terapiei vibra\u021bional-energetice cuantice \u0219i am avut oportunitatea de a colabora cu clinici holistice renumite \u00een Mallorca, precum Mallorca Institute Holistic Health & Wellbeing \u0219i The Balance (cu centre \u00een Mallorca, Z\u00fcrich, Marbella \u0219i Londra).\n\nDe-a lungul carierei mele, am dezvoltat o pasiune profund\u0103 pentru a \u00een\u021belege cum s\u0103n\u0103tatea aspectului nostru energetic vibra\u021bional, ca fiin\u021be umane, ne afecteaz\u0103 \u00een via\u021ba noastr\u0103 de zi cu zi, la nivel fizic, emo\u021bional, mental \u0219i spiritual.\n\nCred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului pentru oricare dintre noi \u0219i c\u0103 responsabilitatea de a tr\u0103i o via\u021b\u0103 a\u0219a cum fiecare \u00ee\u0219i dore\u0219te ne apar\u021bine doar nou\u0103.\n\nCe voi preda \u00een cadrul acestui proiect\n\nVoi preda Secretul Manifest\u0103rii \u0219i al Legii Atrac\u021biei, bazat pe ultimele descoperiri ale Neuroplasticit\u0103\u021bii cerebrale, Psihoterapiei \u0219i Fizicii Cuantice.\n\nAceste sesiuni vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103 descopere:\n\n\u2714 Adev\u0103rata \u0219i completa lor natur\u0103 ca fiin\u021b\u0103 uman\u0103 \u2714 Cum s\u0103 intre \u00een contact cu energia creatoare \u0219i s\u0103 elimine blocajele emo\u021bionale, traumele \u0219i rezisten\u021bele care nu le permit s\u0103 avanseze \u00een via\u021b\u0103, s\u0103 se simt\u0103 \u00eemplini\u021bi, ferici\u021bi \u2714 Importan\u021ba unei abord\u0103ri holistice a s\u0103n\u0103t\u0103\u021bii fizice, mentale \u0219i emo\u021bionale (cum putem pune corpul nostru \u00een proces de auto\u00eens\u0103n\u0103to\u0219ire de form\u0103 natural\u0103) \u2714 Procesul cre\u0103rii unei vie\u021bi la care visezi. Procesul manifest\u0103rii. Cum s\u0103 devii un magnet pentru ceea ce \u00ee\u021bi dore\u0219ti cu adev\u0103rat\n\nBeneficiile acestor sesiuni\n\n\u2705 Aceste sesiuni te vor ghida pentru a te transforma \u00eentr-un creator con\u0219tient \u00een toate aspectele vie\u021bii tale \u2705 Vei \u00eenv\u0103\u021ba cum s\u0103 \u00ee\u021bi reprogramezi subcon\u0219tientul pentru ca mintea ta s\u0103 creeze \u00een planul material ceea ce \u00ee\u021bi dore\u0219ti cu adev\u0103rat \u2705 Vom practica neuroplasticitatea cerebral\u0103 \u0219i neurogeneza pentru a men\u021bine creierul s\u0103n\u0103tos \u0219i a avea o calitate a vie\u021bii crescut\u0103\n\nVoi aborda subiecte precum:\n\n\ud83d\udd39 Aspectul nostru energetic \u0219i impactul pe care \u00eel are asupra materiei \u2013 corpul nostru fizic \ud83d\udd39 Procesul individualiz\u0103rii \u0219i redescoperirea capacit\u0103\u021bii noastre creatoare\n\nSunt ner\u0103bd\u0103toare s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de \u00eenv\u0103\u021bare.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre.\n\nV\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online\nDate de Contact","c":{"web":"bemagnetic.es","ig":"spiritualmenteabierta","wa":"+34666000784"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67a9cb6684591_70.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323703":{"d":"Laura Stan: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Laura Stan, \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een lucrul cu cristalele, grilele de cristale \u0219i utilizarea lor \u00een echilibrarea energetic\u0103 \u0219i manifestare.\n\nExperien\u021ba \u0219i parcursul meu\n\nAm o experien\u021b\u0103 de 5 ani \u00een dezvoltare personal\u0103 \u0219i spiritual\u0103, lucrul cu energia \u0219i utilizarea cristalelor pentru armonizare. Am mentorat \u0219i ghidat mii de femei prin programele mele \u0219i ale altor traineri, sprijinindu-le \u00een procesul de transformare personal\u0103 \u0219i \u00eemplinire. Am aprofundat cuno\u0219tin\u021bele despre cristale, particip\u00e2nd la cursuri \u0219i workshopuri, iar \u00een cadrul sesiunilor individuale am v\u0103zut cum femeile \u00ee\u0219i \u00eendeplinesc dorin\u021bele, \u00ee\u0219i schimb\u0103 via\u021ba \u0219i \u00ee\u0219i reg\u0103sesc puterea interioar\u0103.\n\nCred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului, de aceea curiozitatea \u0219i setea mea de cunoa\u0219tere m-au ghidat pe un drum de studiu \u0219i perfec\u021bionare constant\u0103, ob\u021bin\u00e2nd specializ\u0103ri \u00een:\n\n\ud83d\udd39 Coaching spiritual \u2013 ghidarea persoanelor spre con\u0219tientizare \u0219i transformare interioar\u0103\n\n\ud83d\udd39 Theta Healing \u2013 lucrul cu subcon\u0219tientul pentru eliberarea blocajelor \u0219i accesarea energiilor vindec\u0103toare\n\n\ud83d\udd39 Hipnoterapie \u0219i regresii \u00een alte vie\u021bi \u2013 explorarea amintirilor profunde pentru \u00een\u021belegerea tiparelor actuale\n\n\ud83d\udd39 Radiestezie \u2013 utilizarea pendulului, ansei \u0219i a altor tehnici pentru evaluarea \u0219i echilibrarea energetic\u0103\n\n\ud83d\udd39 Numerologie \u2013 descifrarea tiparelor \u0219i mesajelor codificate \u00een cifre\n\n\ud83d\udd39 Psihoterapie integrativ\u0103 \u2013 abordarea procesului de vindecare prin metode holistice\n\n\ud83d\udd39 Facilitator \u00een constela\u021bii sistemice \u2013 lucrul cu obiecte sistemice pentru explorarea dinamicilor rela\u021bionale \u0219i familiale\n\n\u00cen cursurile \u0219i terapiile mele, recomand adesea cristalele ca instrument de sus\u021binere pentru:\n\n\u2714\ufe0f Echilibrare emo\u021bional\u0103\n\n\u2714\ufe0f Protec\u021bie energetic\u0103\n\n\u2714\ufe0f Manifestare a dorin\u021belor\n\n\u2714\ufe0f Crearea de grile energetice pentru armonizare\n\nPrin aceast\u0103 c\u0103l\u0103torie, am descoperit nu doar magia cristalelor, ci \u0219i capacitatea extraordinar\u0103 a fiec\u0103rui om de a se reconecta cu sine \u0219i de a manifesta via\u021ba pe care \u0219i-o dore\u0219te.\n\nCe voi aduce \u00een acest proiect?\n\n\ud83c\udf1f Workshopuri lunare dedicate lumii cristalelor \ud83c\udf1f\n\nVom explora \u00eempreun\u0103:\n\n\ud83d\udd39 Cristalele \u0219i propriet\u0103\u021bile lor energetice \u2013 Cum alegi cristalele potrivite \u0219i cum s\u0103 le cure\u021bi, \u00eencarci \u0219i programezi corect?\n\n\ud83d\udd39 Grilele de cristale \u2013 Cum po\u021bi crea un c\u00e2mp energetic puternic pentru protec\u021bie, dragoste, prosperitate sau vindecare?\n\n\ud83d\udd39 Cristale pentru chakre \u0219i echilibrarea energetic\u0103 \u2013 Cum s\u0103 folose\u0219ti cristalele pentru a-\u021bi alinia \u0219i armoniza energiile?\n\n\ud83d\udd39 Manifestarea dorin\u021belor cu ajutorul cristalelor \u2013 Care sunt cele mai puternice cristale pentru manifestare \u0219i cum le po\u021bi integra \u00een via\u021ba ta?\n\n\ud83d\udd39 Secretele cristalelor \u0219i combina\u021biile magice \u2013 Cum s\u0103 combini cristalele pentru rezultate maxime?\n\nAceste sesiuni vor fi concepute pentru a v\u0103 ghida pas cu pas \u00een aceast\u0103 lume fascinant\u0103 \u0219i pentru a v\u0103 oferi instrumentele necesare s\u0103 lucra\u021bi cu cristalele \u00een via\u021ba de zi cu zi.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate!\n\n\ud83d\udc8e V\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\n\n\ud83d\udc8e V\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u2728 Cu drag, Laura Stan\n\nTrainer \u00een lucrul cu cristale \u0219i echilibrare energetic\u0103\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67adc622e4e4d_75.png"]},"7323705":{"d":"Mirabela Dumitru: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Mirabela Dumitru \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea ca consilier \u00een Tehnica Almuza.\n\nAm o experien\u021b\u0103 de 1 an \u0219i jum\u0103tate ca \u0219i consilier \u00een tehnica Almuza \u0219i am avut oportunitatea de a lucra cu peste 200 de oameni \u00een sesiuni 1:1.\n\nDe-a lungul carierei mele, am dezvoltat o pasiune profund\u0103 pentru aceast\u0103 tehnic\u0103, deoarece merge \u00een profunzime \u0219i scoate la suprafa\u021b\u0103 lucruri despre noi \u0219i tipare pe care le repet\u0103m, dar de care nu suntem pe deplin con\u0219tien\u021bi.\n\nCred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului!\n\n\u00cen cadrul acestui proiect, voi preda:\n\n\u2705 Ce este Almuza \u0219i cum ne ajut\u0103 aceasta\n\n\u2705 Cum s\u0103 ne \u00eembun\u0103t\u0103\u021bim stima de sine conform datei noastre de na\u0219tere\n\n\u2705 Care sunt punctele noastre forte, dar \u0219i cele slabe, \u00een func\u021bie de ziua na\u0219terii noastre\n\n\u2705 Ce te \u00eempiedic\u0103 s\u0103-\u021bi atingi obiectivele conform datei tale de na\u0219tere\n\n\u2705 Cum s\u0103 faci fa\u021b\u0103 criticilor conform datei tale de na\u0219tere\n\n\u2705 Cum s\u0103 treci de la vis la ac\u021biune\n\n\u2705 Cum s\u0103-\u021bi controlezi emo\u021biile negative conform datei tale de na\u0219tere\n\n\u2705 De ce \u00ee\u021bi pierzi energia \u0219i cum s\u0103-\u021bi refaci energia\n\n\u2705 Cum s\u0103 deblochezi partea financiar\u0103 conform datei tale de na\u0219tere\n\nAceste sesiuni vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103 \u00ee\u0219i \u00een\u021beleag\u0103 mai bine punctele slabe \u0219i s\u0103 se foloseasc\u0103 la capacitate maxim\u0103 de cele forte.\n\nVoi aborda subiecte precum:\n\n\ud83d\udccc Stima de sine\n\n\ud83d\udccc Cariera\n\n\ud83d\udccc G\u00e2nduri limitative\n\n\ud83d\udccc Mo\u0219teniri transgenera\u021bionale\n\n\ud83d\udccc ...\u0219i multe altele!\n\nSunt ner\u0103bd\u0103toare s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de \u00eenv\u0103\u021bare!\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre.\n\nV\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026\nDate de Contact","c":{"tt":"mirabela.c.d","wa":"+40762821919"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67adc9c6a5cba_77.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe1e2fee_5.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323707":{"d":"Andreea Gavrilescu : Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Andreea Gavrilescu. Sunt entuziasmat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea din metafizica chinez\u0103, QiMen (vine din arta razboiului: strategii de aliniere la timpi divini \u0219i fluxuri divine pentru a avea succes, a accesa si folosi ceea ce este dincolo de ceea ce se vede, \u00eentreb\u0103ri \u0219i r\u0103spunsuri existen\u021biale, etc.)\n\nAm o experien\u021b\u0103 de 8 ani \u00een sesiuni individuale despre destin \u0219i aliniere la puterea si r\u0103spunsurile interioare (prin citiri Akashice, ghidare 1:1 \u00een Akasha \u0219i conexiune directa cu Spiritul, channeling, astrologie mayasa \u0219i chinez\u0103, solu\u021bii din 6 sisteme de autocunoa\u0219tere). De 3 ani folosesc metafizica chinez\u0103, QiMen, \u00een strategii (de ac\u021biune, planificare, manifestare, focus pe solu\u021bii) si de autocunoa\u0219tere (cine sunt, re\u021beta proprie de a aduce focusul inten\u021biei \u00een planul concret). Am avut oportunitatea de a lucra cu peste 200 de persoane, am \u021binut 3 seminarii \u00een persoan\u0103 despre QiMen. Energia anului 2025 accelereaz\u0103 tot procesul, inclusiv acum al\u0103turi de voi.\n\nDe-a lungul carierei mele, am dezvoltat pasiune, minunare si respect pentru acest sistem foarte concret si rapid: previziuni (posibilit\u0103\u021bile momentului pentru alegeri inspirate, a valida o strategie, a \u00eentoarce o situa\u021bie); strategii de a ajunge la rezultatul dorit (date si momente de execu\u021bie, formule pentru a ajunge din punctul actual in punctul dorit); alinierea la destin \u0219i arhetipul nativ principal pentru a avea succes; harta destinului (18 domenii de via\u021b\u0103 \u0219i cum se coreleaz\u0103, cum le armonizez, autocunoastere pe fiecare nivel \u0219i plan al meu). Scopul este unul strategic: autocunoa\u0219tere, creare de solu\u021bii, claritate asupra situa\u021biei actuale \u0219i posibilit\u0103\u021bi de a alege con\u0219tient. Este un proces continuu de \u00eenv\u0103\u021bare \u0219i folosire, cu rezultate rapide (\u0219i magice), integrare \u0219i a merge tot mai departe in necunoscut.\n\n\u00cen cadrul acestui proiect, voi aduce solu\u021bii practice lunare pentru a folosi energia fiec\u0103rei luni \u00een mod strategic: ne inten\u021bion\u0103m luna prin comenzi \u00een campul cuantic; gasim zilele cele mai bune pentru a ac\u021biona (\u00een relatii, prosperitate, \u00eens\u0103n\u0103to\u0219ire, carier\u0103); ne facem strategii pentru situa\u021bii \u0219i evenimente \u00een func\u021bie de ce vrem s\u0103 ob\u021binem.\n\nAceste sesiuni vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii:\n\n- s\u0103-\u0219i acceseze \u0219i foloseasc\u0103 resursle interioare \u0219i intuitia\n\n- s\u0103 se alinieze la fluxuri universale \u0219i s\u0103 foloseasc\u0103 energiile ciclice pentru a naviga cu succes in 2025\n\n- s\u0103-\u0219i aduc\u0103 din subtil \u00een concret inten\u021biile\n\n- s\u0103 g\u0103seasc\u0103 solu\u021bii \u0219i s\u0103 treac\u0103 peste provoc\u0103ri\n\n- s\u0103 \u00eembr\u0103\u021bi\u0219eze schimbarea.\n\nAdic\u0103 cum s\u0103-\u0219i \u00eembun\u0103t\u0103\u021beasc\u0103 via\u021ba \u0219i s\u0103 se bucure de c\u0103l\u0103toria uman\u0103, care devine asumat\u0103 \u0219i con\u0219tient\u0103, \u00een armonie cu fluxurile universale, contribuind la \u00centreg.\n\nVoi aborda subiecte precum: cum folosim intui\u021bia \u0219i \u00een\u021belepciunea, cum ne sus\u021bine C\u00e2mpul Cunatic \u0219i care este rolul nostru \u00een plan uman, care sunt \u201clegile\u201d manifest\u0103rii, cum folosim energia (locului \u0219i a spa\u021biului) \u00een negocieri \u0219i evenimente pentru a ob\u021bine ce ne dorim.\n\nEu v\u0103 a\u0219tept cu drag \u0219i entuziams s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie prin energii \u0219i Esen\u021b\u0103, cu \u00eenv\u0103\u021bare \u0219i posibil, pentru o via\u021b\u0103 \u00eemplinit\u0103 \u0219i con\u0219tient\u0103.\n\nSunt recunosc\u0103toare pentru aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii. V\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim pe cale! \ud83e\udd17\ud83d\udc9b\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67f3ca86d7e1a_CursurionlineGCD_totitrainerii1920x1080px5.png"]},"7323708":{"d":"Cristina Cojocaru : Prezentare personal\u0103\n\nBun g\u0103sit, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nSunt Cristina Cojocaru \u0219i vin al\u0103turi de voi nu doar ca s\u0103 ofer o serie de cursuri, ci pentru a v\u0103 fi ghid, sprijin \u0219i oglind\u0103 \u00een propria voastr\u0103 devenire.\n\n\nM\u0103 al\u0103tur acestei platforme cu inten\u021bia clar\u0103 de a crea un spa\u021biu \u00een care s\u0103 \u00een\u021belegem:\nde ce uneori vrem, dar nu putem; vis\u0103m, dar ne oprim; \u00eencepem, dar renun\u021b\u0103m.\n\nSunt coach intuitiv-holistic, terapeut cu experien\u021b\u0103 \u00een lucrul cu bioc\u00e2mpul uman \u0219i facilitator de procese de vindecare profund\u0103. \u00cen ultimii 13 ani, am traversat propriul drum de reconstruc\u021bie interioar\u0103 \u2013 de la haos la claritate, de la a m\u0103 sim\u021bi invizibil\u0103 \u0219i inutil\u0103, la a deveni femeia care \u0219tie c\u0103 e aici pentru a ghida al\u021bi oameni spre lumin\u0103. Am renun\u021bat la etichetele impuse, la a demonstra, la a cere voie. Mi-am reconstruit identitatea, pas cu pas, \u00eembin\u00e2nd spiritualitatea cu concrete\u021bea, iubirea cu asumarea \u0219i bl\u00e2nde\u021bea cu ac\u021biunea.\n\nAm practicat ani de zile tehnici de accesare a subcon\u0219tientului \u0219i azi folosesc dou\u0103 metode care m-au sus\u021binut inclusiv pe mine s\u0103 renasc:\n\n\ud83d\udd39 ThetaHealing\u00ae\ufe0f \u2013 o metod\u0103 profund\u0103 de lucru cu subcon\u0219tientul, care se activeaz\u0103 prin conectare cu energia creatoare, acces\u00e2nd undele Theta.\nAceast\u0103 tehnic\u0103 ne permite s\u0103 identific\u0103m credin\u021bele care stau la baza realit\u0103\u021bilor repetitive \u0219i s\u0103 le schimb\u0103m instant, prin comenzi clare \u0219i ghidate, \u00eentr-un spa\u021biu sacru de lucru energetic.\n\n\ud83d\udd39 Access Consciousness\u00ae\ufe0f \u2013 o colec\u021bie de instrumente simple \u0219i extrem de eficiente care deschid u\u0219i acolo unde mintea vede doar ziduri.\n\n\nNe ajut\u0103 s\u0103 ie\u0219im din \u201ede ce nu pot?\u201d \u0219i s\u0103 trecem \u00een \u201ece pot alege acum?\u201d.\n\n\u00cen acest proiect, voi sus\u021bine cursuri s\u0103pt\u0103m\u00e2nale live pe Zoom, \u00een care vom lucra \u00eempreun\u0103 \u2013 nu doar cu informa\u021bie, ci cu transformare real\u0103.\n\n\nVom cobor\u00ee \u00een straturile ad\u00e2nci ale subcon\u0219tientului pentru a cur\u0103\u021ba tot ce nu \u00ee\u021bi mai serve\u0219te \u0219i vom reactiva \u00een tine puterea, vocea \u0219i libertatea pe care le-ai pierdut pe drum.\n\n\ud83c\udf11 Iat\u0103 c\u00e2teva din por\u021bile pe care le vom deschide \u00eempreun\u0103:\n\n1. De ce renun\u021bi \u00eenainte s\u0103 reu\u0219e\u0219ti?Pentru c\u0103 ai \u00eenv\u0103\u021bat c\u0103 e mai sigur s\u0103 visezi dec\u00e2t s\u0103 prime\u0219ti.\nAici dezv\u0103luim r\u0103d\u0103cina tiparului \u201em\u0103 opresc exact \u00eenainte de linia de sosire\u201d \u2013 \u0219i cur\u0103\u021b\u0103m frica de expunere, de schimbare \u0219i de succes.\n\n2. Ce verdict ai acceptat f\u0103r\u0103 s\u0103 \u0219tii? Poate ai semnat un contract invizibil cu mediocritatea.\nExplor\u0103m credin\u021bele mo\u0219tenite care \u021bi-au dictat via\u021ba pe t\u0103cute: fii modest\u0103, nu deranja, nu cere prea mult. \u0218i \u00eencepem s\u0103 le dizolv\u0103m.\n\n3. Cum \u00ee\u021bi sabotezi succesul ca s\u0103 nu fii respins? \u00cen ad\u00e2ncul t\u0103u, crezi c\u0103 succesul te va separa de cei dragi. Vom lucra cu fricile de respingere, excludere \u0219i tr\u0103dare care te opresc s\u0103 devii cine e\u0219ti \u2013 \u0219i s\u0103 prime\u0219ti ceea ce e deja preg\u0103tit pentru tine.\n\n4. Ce tipar te face s\u0103 crezi c\u0103 nu meri\u021bi mai mult? Merituozitatea nu se activeaz\u0103 din voin\u021b\u0103, ci din adev\u0103r. Acces\u0103m jur\u0103mintele invizibile, programele de autolimitare \u0219i energia vinov\u0103\u021biei care \u021bi-a blocat p\u00e2n\u0103 acum fluxul natural al prosperit\u0103\u021bii.\n\n5. De ce \u021bi-e ru\u0219ine s\u0103 vorbe\u0219ti despre bani? Pentru c\u0103 ai asociat banii cu arogan\u021b\u0103, ru\u0219ine sau vin\u0103.\nCur\u0103\u021b\u0103m convingerile vechi despre spiritualitate \u0219i bani, \u0219i plant\u0103m \u00een locul lor \u00een\u021belepciunea noii energii: Banii sunt un instrument al sufletului \u00een manifestare.\n\n6. Cine ai fi f\u0103r\u0103 frica de ce spun ceilal\u021bi? \u00centr-o lume care te-a \u00eenv\u0103\u021bat s\u0103 te ascunzi, noi \u00eenv\u0103\u021b\u0103m din nou s\u0103 str\u0103lucim cu adev\u0103r.\n\n\n\nVom lucra cu programul de invizibilitate, ru\u0219inea de a fi v\u0103zut\u0103 \u0219i frica de judecat\u0103 \u2013 \u0219i vom activa libertatea de a alege pentru tine.\n\nSunt aici s\u0103-\u021bi amintesc c\u0103 nu e\u0219ti singur. \u0218i c\u0103 nu e\u0219ti gre\u0219it \u2013 e\u0219ti doar plin de convingeri care nu sunt ale tale.\n\nTe invit cu inima deschis\u0103 s\u0103 intri \u00een aceste sesiuni ca \u00eentr-un sanctuar \u00een care te po\u021bi elibera, reconstrui, realinia. Eu voi fi prezent\u0103 \u00een fiecare clas\u0103, \u00een fiecare \u00eentrebare, \u00een fiecare moment \u00een care te sim\u021bi pierdut.\n\n\n\nMisiunea mea este ca TU s\u0103 reu\u0219e\u0219ti \u2013 nu pentru sistem, ci pentru tine.\n\n\n\nPentru c\u0103 meri\u021bi. Pentru c\u0103 po\u021bi. Pentru c\u0103 e\u0219ti preg\u0103tit.\n\nNe vedem live \u2013 acolo unde cuvintele nu mai sunt suficiente\u2026 \u0219i \u00eencepe adev\u0103rata alchimie. \u2728\n\n\u00cenregistr\u0103ri Clase Online\nMateriale Utile\nDe ce renun\u021bi\nCe verdict ai acceptat\nCum \u00ee\u021bi sabotezi succesul","c":{"pdf":"Decerenunti.pdf,CeverdictaiacceptatPDF.pdf,Cumitisabotezisuccesul1.pdf","pdfUrls":["https://d1yei2z3i6k35z.cloudfront.net/12980838/68a82f720c427_Decerenunti.pdf","https://d1yei2z3i6k35z.cloudfront.net/12980838/68b0726175c8f_CeverdictaiacceptatPDF.pdf","https://d1yei2z3i6k35z.cloudfront.net/12980838/68c55b7b561df_Cumitisabotezisuccesul1.pdf"]},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/6850350d09b77_CursurionlineGCD_totitrainerii1920x1080px1.png"]},"7323710":{"d":"Mona Raus: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit! Numele meu este Mona Raus \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een limba englez\u0103.\n\nAm o experien\u021b\u0103 de peste 20 ani \u00een traducere \u0219i interpretariat (englez\u0103 & francez\u0103) \u0219i peste 7 ani \u00een predarea limbii engleze. \u00cen calitate de traduc\u0103tor certificat am avut oportunitatea de a lucra cu institu\u021bii publice relevante la traducerea acquis-ului comunitar pentru aderarea Rom\u00e2niei la UE (traduc\u0103tor IER), la diverse conferin\u021be, evenimente, lucr\u0103ri importante [Ministerul Justi\u021biei, CCR etc.]. De-a lungul carierei mele de trainer de limba englez\u0103 cu certificare CELTA (Mona Pentru Engleza Ta) am dezvoltat o pasiune profund\u0103 pentru a ajuta rom\u00e2nii de pretutindeni s\u0103 \u00eenve\u021be limba englez\u0103 pentru a putea comunica cu u\u0219urin\u021b\u0103 \u0219i cred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului.\n\n\u00cen cadrul acestui proiect, voi preda no\u021biuni de limba englez\u0103. Aceste sesiuni vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103 \u00eenve\u021be \u0219i s\u0103 \u00een\u021beleag\u0103 limba englez\u0103.\n\nVoi aborda subiecte din gramatica, vocabularul \u0219i formul\u0103rile specifice limbii engleze \u0219i sunt ner\u0103bd\u0103toare s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de \u00eenv\u0103\u021bare.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online\nTeme & Materiale Utile\nTem\u0103 Lec\u021bia 1 - 11.1.2025\nTem\u0103 Lec\u021bia 2 - 18.01.2025\nTem\u0103 Lec\u021bia 3 - 25.1.2025\nTem\u0103 Lec\u021bia 4 - 1.2.2025\nTem\u0103 Lec\u021bia 5 - 8.2.2025\n oudfront.net/3270029/67a1bfe1e2fee_5.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfd648a63_2.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323717":{"d":"Adriana Radu: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Adriana Radu, Digital & AI Business Mentor, \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een mentoratul de business aliniat cu valorile personale \u0219i aspira\u021biile profesionale.\n\nAm o experien\u021b\u0103 de 15 ani ca director de resurse umane \u00een companii multina\u021bionale precum Coca-Cola, Henkel, Leoni, \u0219i Ixia, unde am coordonat echipe mari \u0219i am dezvoltat strategii organiza\u021bionale complexe.\n\n\u00cen ultimii 11 ani, am devenit antreprenor, activ\u00e2nd ca consultant, career management coach, iar \u00een ultimii 4 ani ca digital business coach. M\u0103 concentrez pe mentoring-ul antreprenorilor \u0219i soloprenorilor care \u00ee\u0219i doresc s\u0103 construiasc\u0103 afaceri aliniate cu valorile lor personale. Majoritatea clien\u021bilor mei sunt coachi, terapeu\u021bi, autori de cursuri \u0219i consultan\u021bi.\n\nAceast\u0103 tranzi\u021bie profesional\u0103 mi-a oferit experien\u021ba practic\u0103 de a cre\u0219te un business de soloprenor de la zero. Cred cu t\u0103rie c\u0103 alinierea \u00eentre valorile personale, mentalitatea \u0219i strategia de business este cheia succesului pe termen lung.\n\nFiind pasionat\u0103 de tehnologie, anul trecut am lansat propria aplica\u021bie AI, AiRA, prima aplica\u021bie de business \u0219i marketing dedicat\u0103 coachilor, terapeu\u021bilor \u0219i consultan\u021bilor. Este uimitor c\u00e2te activit\u0103\u021bi pot fi optimizate folosind inteligen\u021ba artificial\u0103.\n\nSus\u021bin cu t\u0103rie o cre\u0219tere sustenabil\u0103, pas cu pas. Clien\u021bii mei au atins \u00een 2023 o cifr\u0103 de peste 350.000 de euro.\n\n\u00cen cadrul acestui proiect, voi preda strategii de business, marketing \u0219i dezvoltarea unei comunit\u0103\u021bi de fani \u00een jurul brandului personal pentru soloprenori care doresc s\u0103 transforme pasiunile lor \u00een afaceri autentice \u0219i sustenabile.\n\nObiectivele sesiunilor:\n\nIdentificarea ni\u0219ei \u0219i a avatarului potrivit pentru afacerea voastr\u0103.\n\nConstruirea unei comunit\u0103\u021bi puternice \u0219i implicate care s\u0103 genereze clien\u021bi loiali.\n\nUtilizarea tehnologiei, inclusiv AI, pentru a optimiza timpul \u0219i productivitatea.\n\nCrearea produselor cerute de comunitatea voastr\u0103.\n\nAtragerea audien\u021bei potrivite care \u00ee\u0219i dore\u0219te produsele voastre.\n\nCrearea unor oferte atractive pentru portofoliul vostru de produse.\n\nConstruirea unui funnel automatizat pentru generarea de leaduri.\n\nDescoperirea abilit\u0103\u021bilor \u0219i mindset-ului necesare pentru cre\u0219terea unui business.\n\nSubiectele abordate:\n\nCum s\u0103 crea\u021bi claritate \u00een strategia voastr\u0103 de business.\n\nDefinirea ni\u0219ei \u0219i a unui avatar profitabil.\n\nTehnici practice de construire a unei comunit\u0103\u021bi active.\n\nStrategii de marketing adaptate pentru soloprenori.\n\nCum s\u0103 creezi un produs \u0219i o ofert\u0103 de nerefuzat folosind AI.\n\nCum s\u0103 creezi materiale \u0219i exerci\u021bii cu ajutorul AI.\n\nFunneluri de generare de leaduri \u0219i v\u00e2nzare.\n\nCum s\u0103 alinia\u021bi afacerea cu valorile personale pentru succes autentic.\n\nIdentificarea \u0219i dezactivarea autosabotorilor care \u00eempiedic\u0103 cre\u0219terea afacerii.\n\nRutine \u0219i discipline pentru a deveni un antreprenor de succes.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a lucra \u00eempreun\u0103 \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. Abia a\u0219tept s\u0103 v\u0103 \u00eemp\u0103rt\u0103\u0219esc instrumente practice \u0219i s\u0103 v\u0103 ajut s\u0103 transforma\u021bi ideile voastre \u00een proiecte de succes.\n\nV\u0103 invit s\u0103 participa\u021bi activ la cursuri, s\u0103 pune\u021bi \u00eentreb\u0103ri \u0219i s\u0103 v\u0103 implica\u021bi, pentru c\u0103 interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii \u0219i cre\u0219terii!\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim! \ud83d\ude0a\n\n\u00cenregistr\u0103ri Clase Online:\nMateriale Utile\nAtelier \u201dFunnel Mastery\u201d\nCursurile Mele\nDate de Contact","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/678d508159d71_54.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfde298cf_4.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe1e2fee_5.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfd648a63_2.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323724":{"d":"Ionela Bejinariu: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Ionela Bejinariu \u2013 business & money mindset coach \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur acestei comunit\u0103\u021bi pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een dezvoltarea \u0219i transformarea durabil\u0103 a rela\u021biei cu banii \u0219i s\u0103 te bucuri de via\u021ba ta la clasa business \u2013 personal & profesional.\n\nAm o experien\u021b\u0103 de 5 ani ca Business Coach \u0219i am avut op ionezi cu succes banii \u00eenc\u00e2t s\u0103 \u00ee\u021bi dep\u0103\u0219e\u0219ti limitele & a\u0219tept\u0103rile\n\n4. Descoperi propriile Pre\u0163uri Premium pe care clien\u0163ii le pl\u0103tesc cu pl\u0103cere\n\n5. \u00cenve\u021bi cum s\u0103 fructifici noile tale oportunit\u0103\u0163i,\n\n\u0218i multe altele destinate dezvolt\u0103rii tale \u0219i a rela\u021biei tale cu banii. Iar eu sunt ner\u0103bd\u0103toare s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de \u00eenv\u0103\u021bare.\n\nSunt Ionela Bejinariu, Business & Money Mindset Coach \u0219i sunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre.\n\nV\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\nVideo Introductiv\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online. 2026\nMateriale Utile\nDescarc\u0103 Aici Caietul de Lucru\nDate de Contact","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/6762915c0caa1_IonelaBejinariubun.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe1e2fee_5.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfd648a63_2.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323725":{"d":"Florin P\u0103sat: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Florin P\u0103sat \u0219i sunt foarte \u00eenc\u00e2ntat s\u0103 m\u0103
