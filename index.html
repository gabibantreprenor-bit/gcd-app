const DE={"7323649":{"d":"Angel Rodian: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit! Numele meu este Angel Rodian \u0219i sunt foarte \u00eenc\u00e2ntat s\u0103 m\u0103 al\u0103tur acestei comunit\u0103\u021bi pentru a \u00eemp\u0103rt\u0103\u0219i cu voi cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een domeniul transform\u0103rii fizice \u0219i mentale.\n\nAm o experien\u021b\u0103 profesionala de 12 ani \u00een fitness \u0219i antrenorat personal \u0219i am avut oportunitatea de a lucra cu mii de oameni, ajut\u00e2ndu-i s\u0103 ob\u021bin\u0103 corpul dorit \u0219i o mentalitate de \u00eenving\u0103tor. De-a lungul carierei mele, am c\u00e2\u0219tigat multiple premii \u00een domeniul culturismului \u0219i fitnessului \u0219i am devenit antrenor premiat la FitChallenge \u0219i Men's Health Top Trainer. Am o pasiune profund\u0103 pentru a ajuta oamenii s\u0103 devin\u0103 cea mai bun\u0103 versiune a lor, at\u00e2t fizic, c\u00e2t \u0219i mental, \u0219i cred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului.\n\n\u00cen cadrul acestui program, voi preda \u201eFitness \u0219i Mindset de campion\u201d, un program care te va ghida pas cu pas pentru a-\u021bi transforma corpul \u0219i mintea. Aceste sesiuni vor fi concepute pentru a te ajuta s\u0103 elimini gr\u0103simea, s\u0103 construie\u0219ti mu\u0219chi defini\u021bi \u0219i s\u0103 \u00ee\u021bi dezvol\u021bi o mentalitate de \u00eenving\u0103tor care s\u0103 te sprijine pe termen lung.\n\nVoi aborda subiecte precum:\n\n\u00b7 Construirea unui corp puternic \u0219i definit\n\n\u00b7 Dezvoltarea unei mentalit\u0103\u021bi de campion\n\n\u00b7 Cum s\u0103 \u00ee\u021bi personalizezi planul de nutri\u021bie \u0219i antrenament\n\n\u00b7 Cum s\u0103 men\u021bii rezultatele pe termen lung \u0219i s\u0103 \u00eenfrun\u021bi obstacolele mentale\n\n\u00b7 Sunt ner\u0103bd\u0103tor s\u0103 te ghidez \u00een aceast\u0103 c\u0103l\u0103torie de \u00eenv\u0103\u021bare \u0219i s\u0103-\u021bi demonstrez c\u0103 po\u021bi atinge obiectivele pe care \u021bi le-ai propus.\n\nSunt foarte bucuros de aceast\u0103 oportunitate de a lucra \u00eempreun\u0103 \u0219i de a contribui la dezvoltarea fiec\u0103ruia dintre voi. V\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi programului nostru \u0219i s\u0103 v\u0103 preg\u0103ti\u021bi \u00eentreb\u0103rile, deoarece interac\u021biunea \u0219i angajamentul sunt esen\u021biale pentru succes.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 \u00eencepem!\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri clase online 2025\n\u00cenregistr\u0103ri clase online 2026\nDate de contact","c":{"fb":"rodian.angel","ig":"angelrodianprofitness"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/676fc2e323f14_AngelRodian.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png"]},"7323652":{"d":"Gabriela Ruja: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Gabriela Ruja \u0219i sunt \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een domeniul aerobicului.\n\nFac sport de c\u00e2nd eram mic\u0103. Am fost militar timp de 10 ani \u0219i am luat parte la cele mai dure antrenamente preg\u0103tindu-m\u0103 pentru misiuni interna\u021bionale, am f\u0103cut parte din lotul sportiv \u0219i consider c\u0103 toate acestea au adus un plus \u00een via\u021ba mea de sportiv.\n\nAm o experien\u021b\u0103 de 7 ani ca instructor de aerobic \u0219i am avut oportunitatea de a lucra \u00een diferite s\u0103li de sport din Bucure\u0219ti, precum NewStartGym, NewFitWay, Stay Fit Gym, \u0219i s\u0103 particip pe scen\u0103 la evenimente sport.\n\nDe-a lungul carierei mele, am dezvoltat o pasiune profund\u0103 pentru aerobicul de grup, unde \u00eembin\u0103m elemente din aerobic pe muzic\u0103 energic\u0103, lucr\u00e2nd astfel tot corpul, \u0219i cred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului.\n\n\u00cen cadrul acestui proiect, voi preda exerci\u021bii pentru \u00eentreg corpul, iar totul se va desf\u0103\u0219ura \u00een 3 etape:\n\n\u2714 Etapa de \u00eenc\u0103lzire \u2714 Etapa de exerci\u021bii specifice pentru trenul inferior \u0219i trenul superior \u2714 Etapa de relaxare/stretching\n\nAceste sesiuni vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103 \u00ee\u0219i \u00eembun\u0103t\u0103\u021beasc\u0103 condi\u021bia capilarelor din mu\u0219chi, s\u0103 ajute s\u00e2ngele s\u0103 aduc\u0103 mai mult oxigen c\u0103tre sistemul muscular, s\u0103 aib\u0103 mai mult\u0103 energie \u0219i stare de bine \u0219i o condi\u021bie fizic\u0103 mai bun\u0103.\n\nVoi aborda exerci\u021bii de tip aerob \u0219i anaerob, voi combina exerci\u021biile de for\u021b\u0103 cu cele cardio, voi apela la exerci\u021bii calistenice \u0219i izometrice, iar eu sunt ner\u0103bd\u0103toare s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie.\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri clase online 2025\n\u00cenregistr\u0103ri clase online 2026","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67a788b75496f_72.png"]},"7323653":{"d":"Marian Ganciu: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Marian Ganciu \u0219i sunt foarte \u00eenc\u00e2ntat s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een Vindecarea Holistica cu ajutorul Herbalismului, Fitoterapiei \u0219i Trauma Healing.\u00a0\n\nAm o experien\u021b\u0103 de 6 ani \u00een Herbalism si Fitoterapie, 5 ani in Nutritie, 2 ani \u0219i jum\u0103tate Terapeut- Trauma Healing \u2013 Compassionate Inquiry \u0219i am avut oportunitatea de a crea brand-ul si programele holistice Herb Explorers. De-a lungul carierei mele, am dezvoltat o pasiune profund\u0103 pentru vindecarea holistica- S\u0103m\u00e2n\u021b\u0103, R\u0103d\u0103cin\u0103 \u0219i Ramur\u0103- metafor\u0103 ce o folosesc \u00een lucrul cu clien\u021bii mei, baz\u00e2ndu-mi recomand\u0103rile de plante medicinale pe o evaluare detaliat\u0103 a st\u0103rii de s\u0103n\u0103tate.\n\nAceasta identific\u0103 at\u00e2t simptomele acute (ramura), condi\u021biile mai profunde sau cronice (r\u0103d\u0103cina) care pot crea dezechilibru, c\u00e2t \u0219i\u00a0 dezechilibrele emo\u021bionale (s\u0103m\u00e2n\u021ba), \u0219i cred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului.\n\n\u00cen cadrul acestui proiect, voi preda fitoterapia, tehnici \u0219i formule de vindecare holistica . Aceste sesiuni vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103 invete folosirea corecta a plantelor, cum sa se hraneasca sanatos, cum sa indentifice blocajele si cum sa lucreze cu trauma pentru a avea o viata mai implinita si mai bogata.\n\n\u00a0\n\nVoi aborda subiecte precum: detoxifierea organismului-cum se face corect, cum ne pregatim ceaiurile, cum lucram cu somatizarea emotiilor, cum ne organizam dieta in asa fel incat sa beneficiem maxim de nutrienti si minerale, cum putem sa scapam de anumite boli, cum ne armonizam corpul holistic, iar eu sunt ner\u0103bd\u0103tor s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de \u00eenv\u0103\u021bare.\n\n\u00cenregistr\u0103ri Clase Online\nDate de contact","c":{"web":"herbexplorers.ro","fb":"HerbExplorers","ig":"herb_explorers","wa":"+40749223615"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67ffba29d6ce9_CursurionlineGCD_totitrainerii1920x1080px1.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323654":{"d":"Geraldina Massari: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Geraldina Massari alias MONA \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een s\u0103n\u0103tatea holistic\u0103, neuro\u0219tiin\u021b\u0103 \u0219i domeniul medical.\n\nAm o experienta de peste 20 de ani ca si cadru medical specializat \u00een obstetric\u0103-ginecologie, diabetologie \u0219i \u00eengrijiri paliative. Ace\u0219ti ani mi-au oferit lec\u021bii valoroase despre complexitatea \u0219i frumuse\u021bea corpului uman, dar \u0219i despre puterea vindec\u0103toare a empatiei \u0219i a conexiunii autentice cu ceilal\u021bi.\n\nPe parcurs, am sim\u021bit chemarea de a explora \u0219i latura holistic\u0103 a s\u0103n\u0103t\u0103\u021bii, ceea ce m-a condus spre noi specializ\u0103ri. Sunt terapeut Bowen Master 2 \u0219i de\u021bin o certificare \u00een Baby Bowen, domeniu care m\u0103 inspir\u0103 profund prin delicate\u021bea \u0219i eficien\u021ba sa. \u00cen plus, studiile mele \u00een hipnoterapie, inclusiv autohipnoza \u0219i hipnoza regresiv\u0103, mi-au ar\u0103tat cum mintea \u0219i corpul pot lucra \u00eempreun\u0103 pentru autovindecare.\n\nRecent, am ad\u0103ugat \u00een bagajul meu de cuno\u0219tin\u021be o specializare ca \u0219i neuroscience coach \u0219i sunt aproape de finalizarea unui program avansat la Brain Academy din Bruxelles, unde m\u0103 voi certifica ca Brain Coach. Aceste studii mi-au deschis noi perspective asupra poten\u021bialului incredibil al creierului uman.\n\nNu \u00een ultimul r\u00e2nd, ca \u0219i facilitator certificat Star Magic, integrez medicina cuantic\u0103 \u00een abordarea holistic\u0103 a s\u0103n\u0103t\u0103\u021bii, explor\u00e2nd dimensiuni mai profunde ale vindec\u0103rii \u0219i armoniei interioare.\n\nToate aceste experien\u021be m-au format nu doar ca profesionist, ci \u0219i ca om. Cred cu t\u0103rie c\u0103 s\u0103n\u0103tatea nu este doar absen\u021ba bolii, ci un echilibru \u00eentre corp, minte \u0219i suflet. \u00cemi doresc ca \u00eent\u00e2lnirile noastre s\u0103 fie o surs\u0103 de inspira\u021bie \u0219i transformare pentru voi, iar \u00eempreun\u0103 s\u0103 descoperim instrumente valoroase pentru o via\u021b\u0103 mai s\u0103n\u0103toas\u0103 \u0219i mai \u00eemplinit\u0103.\n\n\u00cen cadrul acestui proiect, voi sus\u021bine o serie de cursuri captivante \u0219i transformatoare despre s\u0103n\u0103tatea holistic\u0103 \u0219i neuro\u0219tiin\u021b\u0103, concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103 descopere instrumente practice pentru echilibru, dezvoltare personal\u0103 \u0219i auto-vindecare. Aceste sesiuni vor contribui la dezvoltarea unor abilit\u0103\u021bi cheie, precum gestionarea stresului, \u00eembun\u0103t\u0103\u021birea performan\u021belor mentale \u0219i fizice, precum \u0219i aprofundarea \u00een\u021belegerii leg\u0103turii dintre corp \u0219i minte.\n\nVoi aborda subiecte precum:\n\n\u00b7 Puterea Focusului \u2013 cum s\u0103 \u00ee\u021bi direc\u021bionezi aten\u021bia pentru a atinge obiectivele dorite;\n\n\u00b7 Cum s\u0103 ne g\u0103sim fluxul \u2013 \u00eenv\u0103\u021barea tehnicilor pentru o stare de performan\u021b\u0103 optim\u0103;\n\n\u00b7 Cum s\u0103 ne reconect\u0103m creierul \u2013 tehnici de neuroplasticitate pentru resetarea \u0219i optimizarea mental\u0103;\n\n\u00b7 Cum s\u0103 ne p\u0103str\u0103m creierul s\u0103n\u0103tos \u2013 strategii pentru prevenirea degrad\u0103rii cognitive;\n\n\u00b7 Cum s\u0103 ne gestion\u0103m stresul \u2013 tehnici eficiente pentru reducerea stresului \u0219i anxiet\u0103\u021bii;\n\n\u00b7 Neuro\u0219tiin\u021ba cump\u0103r\u0103turilor \u2013 marketingul \u0219i manipularea deciziilor;\n\n\u00b7 Cum s\u0103 cre\u0219tem copii uimitori \u2013 neuro\u0219tiin\u021ba aplicat\u0103 \u00een educa\u021bia copiilor;\n\n\u00b7 Neuro\u0219tiin\u021ba somnului \u2013 metode pentru un somn odihnitor \u0219i regenerant;\n\n\u00b7 Tehnici pentru memorare \u0219i abilit\u0103\u021bi de \u00eenv\u0103\u021bare;\n\n\u00b7 Tehnica Biofeedback \u2013 abilit\u0103\u021bi de vindecare prin somaterapie;\n\n\u00b7 Taina rena\u0219terii corpului uman \u2013 tehnici tibetane pentru reechilibrarea \u0219i revitalizarea corpului.\n\nPrima clas\u0103 pe care o voi sus\u021bine este \u201eTehnica Biofeedback \u2013 Abilit\u0103\u021bi de vindecare prin Somaterapie\u201d, deoarece consider c\u0103 este esen\u021bial s\u0103 \u00een\u021belegem c\u00e2t de puternice sunt mecanismele noastre interne. Acest\u0103 clas\u0103 va explora modalit\u0103\u021bi prin care putem activa procesul natural de auto-vindecare, reset\u00e2nd corpul \u0219i restabilind echilibrul interior.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 participa\u021bi la clasele online, s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri \u0219i s\u0103 v\u0103 implica\u021bi activ \u00een acest proces, pentru c\u0103 interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii. V\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim \u0219i s\u0103 explor\u0103m \u00eempreun\u0103 aceast\u0103 c\u0103l\u0103torie a cunoa\u0219terii \u0219i transform\u0103rii!\n\n\u00cenregistr\u0103ri Clase Online\nDate de contact","c":{"fb":"manuela.sumanaru","wa":"+32471401842"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/6792ac2dae79a_60.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323655":{"d":"Florentina Bacosca: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Florentina Bacosca \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een lucrul cu dependen\u021bele \u0219i codependen\u021bele.\n\nAm o experien\u021b\u0103 de 11 ani \u00een sus\u021binerea persoanelor dependente \u0219i a familiilor acestora. Am avut oportunitatea de a lucra \u00eentr-o asocia\u021bie dedicat\u0103 sus\u021binerii persoanelor aflate pe acest drum. De-a lungul carierei mele, am dezvoltat o pasiune profund\u0103 pentru allevierea suferin\u021bei umane, motiv pentru care m-am format ca terapeut \u00een diverse tehnici, precum hipnoza\u0219i theta healing, dar \u0219i ca coach. Cred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului, astfel c\u0103 \u00eemi continui perfec\u021bionarea constant.\n\n\u00cen cadrul acestui proiect, voi preda despre impactul emo\u021bional al dependen\u021belor, indiferent de natura acestora, \u0219i despre pa\u0219ii posibili pentru ie\u0219irea din acest labirint al emo\u021biilor.\n\nAceste sesiuni vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103:\n\nIdentifice prezen\u021ba unei dependen\u021be.\n\n\u00cen\u021beleag\u0103 caruselul emo\u021bional care poate duce spre o dependen\u021b\u0103.\n\nAfle despre sprijinul emo\u021bional necesar \u00een c\u0103l\u0103toria spre o via\u021b\u0103 echilibrat\u0103.\n\nVoi aborda subiecte precum:\n\nImpactul dependen\u021belor asupra vie\u021bii de familie, a carierei \u0219i a propriilor decizii.\n\nModalit\u0103\u021bi de sus\u021binere emo\u021bional\u0103 pentru cei afla\u021bi pe drumul vindec\u0103rii.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre.\n\nV\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026\nDate de contact","c":{"fb":"Florentina-Bacosca","wa":"+00393285831732"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/679be53a82a38_56.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323657":{"d":"Sultana L\u0103cr\u0103mioara Munteanu: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nMisiunea mea este s\u0103 ghidez oamenii \u00een conectarea cu alchimia energiei sexuale \u2013 sursa vitalit\u0103\u021bii, creativit\u0103\u021bii \u0219i puterii interioare. Am o experien\u021b\u0103 de 5 ani ca ghid \u0219i coach transforma\u021bional \u0219i am sprijinit p\u00e2n\u0103 acum peste 500 de femei \u00een procesul lor de descoperire interioar\u0103. \u00cen aceast\u0103 c\u0103l\u0103torie, am observat c\u00e2t de puternic\u0103 este energia vital\u0103 \u0219i energia sexual\u0103 sacr\u0103 \u00een procesul de vindecare \u0219i manifestare. Iubesc manifestarea, vindecarea prin conexiunea cu energia vital\u0103 \u0219i energia sexual\u0103 sacr\u0103, iar pasiunea mea este s\u0103 ajut femeile s\u0103 \u00ee\u0219i recapete puterea interioar\u0103 \u0219i s\u0103 \u00ee\u0219i transforme via\u021ba prin aceast\u0103 conexiune profund\u0103. Cred cu t\u0103rie c\u0103 integrarea acestor cuno\u0219tin\u021be poate aduce schimb\u0103ri profunde \u0219i reale \u00een via\u021ba fiec\u0103rei persoane.\n\n\u00cen cadrul acestui proiect voi preda despre energia vital\u0103 \u0219i energia sexual\u0103 sacr\u0103 \u0219i despre cum ne influen\u021beaz\u0103 via\u021ba la toate nivelurile.\n\nVom explora \u00eempreun\u0103:\n\nCe este energia vital\u0103 \u0219i energia sexual\u0103 sacr\u0103? \u2013 sursa vie\u021bii, creativit\u0103\u021bii \u0219i puterii personale.\n\nCare sunt blocajele care ne \u00eempiedic\u0103 s\u0103 ne conect\u0103m cu aceast\u0103 energie? \u2013 credin\u021be limitative, traume, inhibi\u021bii mo\u0219tenite.\n\nInterzicerile legate de conexiunea cu energia sexual\u0103 \u0219i efectele acestora. \u2013 cum influen\u021beaz\u0103 aceste restric\u021bii rela\u021biile, s\u0103n\u0103tatea \u0219i manifestarea dorin\u021belor.\n\nCum putem transforma aceste blocaje? \u2013 tehnici \u0219i practici pentru eliberarea energiei stagnante \u0219i a traumelor.\n\nCum putem activa aceast\u0103 energie? \u2013 exerci\u021bii de reconectare cu energia feminin\u0103 \u0219i masculin\u0103 interioar\u0103.\n\nCum o direc\u021bion\u0103m acolo unde vrem noi? \u2013 metode de canalizare con\u0219tient\u0103 a energiei pentru vindecare, creativitate \u0219i succes.\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026\nDate de contact","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67cd66ef6deb8_96.png"]},"7323660":{"d":"Laura Ilie: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nAm o experien\u021b\u0103 de 3 ani \u00een practica ayurvedic\u0103, sunt medic cu experien\u021b\u0103 \u00een studii clinice din 2006 \u0219i am avut oportunitatea de a lucra la una dintre cele mai prestigioase firme de studii clinice din \u021bar\u0103. De c\u00e2nd m\u0103 \u0219tiu, \u00eens\u0103 mai ales de la burnout-ul pe care l-am avut \u00een 2019, am dezvoltat o pasiune profund\u0103 pentru vindecarea holistic\u0103, plante \u0219i Ayurveda, iar cred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului.\n\n\u00cen cadrul acestui proiect voi sus\u021bine cursurile:\n\n\u201cCum s\u0103 \u00ee\u021bi \u00eent\u0103re\u0219ti imunitatea cu alimente \u0219i suplimente ayurvedice\n\n\u201cEchilibru \u0219i claritate mental\u0103 folosind metode ayurvedice\n\nAceste sesiuni vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103:\n\nDescopere metode naturale pentru fortificarea sistemului imunitar\n\n\u00cenv\u0103\u021be cum s\u0103 reduc\u0103 inflama\u021bia \u0219i stresul oxidativ prin alimenta\u021bie \u0219i plante ayurvedice\n\nMen\u021bin\u0103 claritatea mental\u0103 prin tehnici specifice Ayurveda\n\nUtilizeze alimente \u0219i plante pentru echilibrarea min\u021bii \u0219i emo\u021biilor\n\nSubiectele abordate\n\nEchilibrarea tipologiei ayurvedice pentru o s\u0103n\u0103tate optim\u0103\n\nPlante \u0219i condimente ayurvedice pentru imunitate \u0219i energie\n\nAlimenta\u021bia sezonier\u0103 \u0219i adaptarea la schimb\u0103rile de mediu\n\nDetoxifierea bl\u00e2nd\u0103 \u0219i resetarea sistemului digestiv\n\nImportan\u021ba somnului \u0219i metode ayurvedice pentru un somn odihnitor\n\n\u00cenregistr\u0103ri Clase Online","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67c44003bcb10_85.png"]},"7323663":{"d":"Daniela Gerner: Prezentare personal\u0103\n\nNumele meu este Daniela Gerner \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur acestei comunit\u0103\u021bi pentru a \u00eemp\u0103rt\u0103\u0219i cu voi cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een domeniul nutri\u021biei.\n\nAm absolvit un master in Stiintele Nutritiei, la baza sunt profesoara de bio\u263a iar in ultimii 7 ani am lucrat ca si nutritonista in mai multe clinici de recuperare in Germania , unde si locuiesc de 25 de ani. . De-a lungul activitatii mele de nutrionista am lucrat cu sute ,\u00a0 chiar mii de pacienti\u00a0 bolnavi de cancer, boli pulmonare, supraponderali, etc care necesitau sustinere pe drumul unei nutritii echilibrate\u00a0 si dezvoltarea unui stil de viata sanatos. \u00a0\n\nAm dezvoltat o pasiune profund\u0103 pentru o nutritie echilibrata si adoptarea unui stil de viata sanatos, absolvind de aceea si multe alte cursuri de dezvoltare si\u00a0 calificare : curs de trainer pentru tehnici de relaxare, curs de trainer in sanatate, mental coach etc ,etc\u00a0 \u0219i cred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia\u00a0 dezvoltarii personale si spirituale si a succesului.\n\n\u00cen cadrul acestui proiect, voi preda clase online\u00a0 cu tema: nutri\u021bia echilibrat\u0103 \u2013 cheia sanatatii zilnice !\n\nAceste sesiuni vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103 \u00ee\u0219i dezvolte abilit\u0103\u021bi importante legate de alimenta\u021bie \u0219i s\u0103n\u0103tate, cum ar fi adoptarea unui stil de via\u021b\u0103 s\u0103n\u0103tos si sustenabil , \u00eenv\u0103\u021barea unor tehnici noi de gestionare a greut\u0103\u021bii , aplicarea principiilor postului intermitent in mod responsabil, dezvoltarea unei relatii pozitive cu mancarea, imbunatatirea energiei\u00a0 \u0219i a st\u0103rii generale de bine.\n\nVoi aborda subiecte precum:\n\nImportan\u021ba micronutrien\u021bilor, macronutrientilor\u00a0 \u0219i a hidrat\u0103rii pentru s\u0103n\u0103tatea optima\n\nPostul intermittent: tipuri si beneficii\u00a0\n\nDieta mediteraneeana \u2013 cheia longevitatii ?\n\nDe ce nu func\u021bioneaz\u0103 dietele?\n\nCum \u00ee\u021bi resetezi metabolismul\u00a0 in mod natural?\n\nSl\u0103bit inteligent: de ce conteaz\u0103 mai mult hormonii dec\u00e2t caloriile?\n\nNutri\u021bia intuitiv\u0103: cum s\u0103 iti\u00a0 ascul\u021bi corpul \u0219i s\u0103 slabesti natural\n\nCum s\u0103 sl\u0103be\u0219ti f\u0103r\u0103 s\u0103 renun\u021bi la alimentele preferate?\n\nUleiuri esen\u021biale \u0219i sl\u0103bitul: mit sau realitate?\n\nNutri\u021bia antiinflamatoare: cheia longevit\u0103\u021bii \u0219i energiei\n\nCe m\u0103n\u00e2nci c\u00e2nd nu ai timp? Strategii pentru mese rapide \u0219i s\u0103n\u0103toase\n\nDetoxifiere natural\u0103: ce func\u021bioneaz\u0103 \u0219i ce este doar marketing?\n\nAlimenta\u021bia care sus\u021bine s\u0103n\u0103tatea intestinului \u0219i imunitatea\n\nSpune Nu zaharului si de ce\u00a0\n\nSi multe multe altele\u2026..\n\nO nutri\u021bie echilibrat\u0103 este cheia pentru un corp s\u0103n\u0103tos \u0219i o minte activ\u0103. Alegerea alimentelor corecte, combinat\u0103 cu o abordare moderat\u0103 \u0219i echilibrat\u0103 a dietei, poate \u00eembun\u0103t\u0103\u021bi semnificativ calitatea vie\u021bii \u0219i preveni multe dintre afec\u021biunile comune ale societ\u0103\u021bii moderne.\n\n\u00a0\n\n\u00cen concluzie, obiectivul acestor sesiuni este de a v\u0103 ajuta s\u0103 \u00een\u021belege\u021bi mai bine cum s\u0103 v\u0103 adapta\u021bi alimenta\u021bia pentru a sprijini o via\u021b\u0103 s\u0103n\u0103toas\u0103 \u0219i echilibrat\u0103. Adoptarea unei nutri\u021bii echilibrate nu este doar despre alegeri alimentare, ci despre crearea unui stil de via\u021b\u0103 care sus\u021bine s\u0103n\u0103tatea zilnic\u0103 \u0219i bun\u0103starea general\u0103.\u00a0\n\nSunt ner\u0103bd\u0103toare s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de \u00eenv\u0103\u021bare \u0219i s\u0103 contribui la succesul vostru personal \u00een ceea ce prive\u0219te s\u0103n\u0103tatea \u0219i bun\u0103starea.\n\nSunt foarte entuziasmata de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\u00a0\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026\nDate de contact","c":{"fb":"danastildeviata","tt":"danastildeviata","li":"gerner-daniela-0917979b","wa":"+491725614308"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/68544100df4ef_CursurionlineGCD_totitrainerii1920x1080px2.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe1e2fee_5.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfd648a63_2.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323664":{"d":"Monica Ionescu: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Monica Ionescu, iar eu sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een Naturopatie, S\u0103n\u0103tate Holistic\u0103, Preven\u021bie \u0219i pentru a promova un stil de via\u021b\u0103 s\u0103n\u0103tos.\n\nAm o experien\u021b\u0103 de peste 10 ani \u00een domeniul s\u0103n\u0103t\u0103\u021bii \u0219i al promov\u0103rii st\u0103rii de bine \u0219i echilibru. De-a lungul timpului, am avut oportunitatea s\u0103 lucrez la Montreal, la Centrul de S\u0103n\u0103tate Holistic\u0103 \u0219i la Academia de Reiki din Montreal. \u00cen prezent, activez \u00een Rom\u00e2nia, la o clinic\u0103 de recuperare medical\u0103 \u0219i medicin\u0103 integrativ\u0103.\n\nDe-a lungul carierei mele, am dezvoltat o pasiune profund\u0103 pentru men\u021binerea s\u0103n\u0103t\u0103\u021bii prin adoptarea unui stil de via\u021b\u0103 s\u0103n\u0103tos \u0219i promovarea preven\u021biei prin metode simple \u0219i accesibile. Acest lucru m-a determinat s\u0103 devin Trainer \u00een Programe de Men\u021binere a S\u0103n\u0103t\u0103\u021bii, fiind convins\u0103 c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului.\n\n\u00cen cadrul acestui proiect, voi sus\u021bine cursuri despre Echilibrul Corp-Minte-Spirit \u0219i cum s\u0103 men\u021binem starea de s\u0103n\u0103tate \u00een via\u021ba cotidian\u0103. Aceste sesiuni vor ajuta membrii comunit\u0103\u021bii s\u0103:\n\nDezvolte obiceiuri alimentare s\u0103n\u0103toase;\n\nFac\u0103 cump\u0103r\u0103turi informat, aleg\u00e2nd produse de calitate;\n\nPrevin\u0103 afec\u021biuni prin adoptarea unui stil de via\u021b\u0103 s\u0103n\u0103tos.\n\nVom aborda subiecte practice, precum:\n\nCombinarea corect\u0103 a alimentelor;\n\nCitirea corect\u0103 a etichetelor produselor;\n\nDetoxifierea \u0219i deparazitarea;\n\nMen\u021binerea s\u0103n\u0103t\u0103\u021bii sistemului digestiv.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 participa\u021bi la cursurile noastre, s\u0103 adresa\u021bi \u00eentreb\u0103ri \u0219i s\u0103 \u00eenv\u0103\u021b\u0103m \u00eempreun\u0103. Interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii \u0219i transform\u0103rii!\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim! \u2764\ufe0f\n\n\u00cenregistr\u0103ri Clase Online\nMateriale Utile\nEchilibrul CMS - CORP (GTCD)\nEchilibrul CMS - MINTEA (GTCD)\nDate de Contact","c":{"pdf":"EchilibrulCMS-CORPGTCD.pdf,EchilibrulCMS-MINTEGTCDMintea.pdf","web":"terapieholistica.blogspot.com","fb":"moni113","wa":"+40724868713","pdfUrls":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67d6ff01920e7_EchilibrulCMS-CORPGTCD.pdf","https://d1yei2z3i6k35z.cloudfront.net/3270029/6801219a6ba06_EchilibrulCMS-MINTEGTCDMintea.pdf"]},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/678d4d81a5c35_51.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323666":{"d":"Ciprian Cucu: Prezentare personal\u0103\n\nSalutare, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit! Numele meu este Ciprian Cucu \u0219i sunt foarte \u00eenc\u00e2ntat s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea din psihologie \u0219i arta citirii chipului.\n\nAm o experien\u021b\u0103 de 10 ani ca specialist \u00een citirea chipului \u0219i am avut oportunitatea de a lucra at\u00e2t cu persoane fizice, c\u00e2t \u0219i cu corpora\u021bii. De la consultan\u021be 1 la 1, la sus\u021binerea de cursuri, conferin\u021be \u0219i workshopuri \u00een fa\u021ba a sute de oameni. De la interviuri de angajare, la cursuri de optimizare a performan\u021bei individuale \u00een companii. Am fost invitat at\u00e2t de trusturile de pres\u0103, c\u00e2t \u0219i \u00een podcasturi \u2013 de la Antena Stars la Realitatea!\n\nDe-a lungul carierei mele, am dezvoltat o pasiune profund\u0103 pentru cunoa\u0219terea omului, rezolvarea conflictelor din trecut \u0219i atingerea celei mai bune variante posibile \u00een prezentul personal. Cred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului, iar fundamentul psihologic, al\u0103turi de instrumentul numit fizionomie \u2013 arta citirii chipului \u2013 reu\u0219esc s\u0103 \u00ee\u021bi aduc\u0103 suficient\u0103 claritate \u00een via\u021ba ta, \u00eenc\u00e2t s\u0103 atingi rezultatele pe care \u021bi le dore\u0219ti.\n\n\u00cen cadrul acestui proiect, voi preda tehnici de citire \u0219i interpretare a chipului. Aceste sesiuni vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103 \u00ee\u0219i dezvolte abilit\u0103\u021bi esen\u021biale de comunicare, observare, \u00een\u021belegerea mai bun\u0103 a emo\u021biilor \u0219i a inten\u021biilor celor din jur \u0219i s\u0103 \u00ee\u0219i \u00eembun\u0103t\u0103\u021beasc\u0103 rela\u021biile. Prin \u00eenv\u0103\u021barea acestor tehnici, ve\u021bi c\u00e2\u0219tiga un nou set de instrumente pentru a descifra personalitatea uman\u0103, autocunoa\u0219tere specific\u0103 ce \u00ee\u021bi va spori \u00eencrederea \u00een sine, o eficien\u021b\u0103 mai bun\u0103 \u00een luarea deciziilor \u0219i capacitatea de a gestiona situa\u021bii complexe \u00een via\u021ba de zi cu zi. Aceste abilit\u0103\u021bi nu doar c\u0103 vor contribui la o mai bun\u0103 \u00een\u021belegere a ta \u0219i a celor din jur, dar vor deschide \u0219i noi oportunit\u0103\u021bi \u00een domenii profesionale precum negocierea, consilierea sau leadership-ul.\n\nVoi aborda subiecte precum:\n\nCum s\u0103 iei cele mai bune decizii \u00een via\u021ba personal\u0103 \u0219i profesional\u0103 prin \u00een\u021belegerea tehnicilor de citire a chipului,\n\nRecomand\u0103ri de optimizare a vie\u021bii din prisma fizionomiei,\n\nCum s\u0103 construie\u0219ti rela\u021bii bazate pe \u00eencredere \u0219i empatie,\n\nCum s\u0103 identifici sinceritatea,\n\nCum s\u0103 \u00ee\u021bi \u00eembun\u0103t\u0103\u021be\u0219ti abilit\u0103\u021bile de negociere \u0219i leadership.\n\nDe asemenea, vom discuta despre aplicarea acestor tehnici \u00een situa\u021bii cotidiene, cum ar fi:\n\nGestionarea conflictelor,\n\nCrearea unui mediu de lucru mai armonios,\n\n\u00cen\u021belegerea nevoilor nespunse ale celor apropia\u021bi.\n\nSunt ner\u0103bd\u0103tor s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de \u00eenv\u0103\u021bare \u0219i s\u0103 v\u0103 ar\u0103t cum aceste cuno\u0219tin\u021be v\u0103 pot \u00eembun\u0103t\u0103\u021bi calitatea vie\u021bii.\n\nSunt foarte entuziasmat de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii. V\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\nVideo Introductiv\n\u00cenregistr\u0103ri Clase Online\nDate de Contact","c":{"web":"fizionomie.ro","fb":"cipriancucu2,cipriancucufizionomie","tt":"cipriancucufizionomie","ig":"cipriancucufizionomie","yt":"CiprianCucuFizionomie","wa":"+40774073752"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67628e43440b1_CiprianCucu.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe1e2fee_5.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfde298cf_4.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323667":{"d":"Dorela Iepan: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nSunt Dorela Iepan \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een vindecarea emo\u021bional\u0103 \u0219i energetic\u0103.\n\nM\u0103 bucur de o experien\u021b\u0103 vast\u0103 \u00een domeniul vindec\u0103rii emo\u021bionale \u0219i energetice, fiind Practician Certificat \u00een metode precum Emotion Code, Body Code, Belief Code, EFT (Emotional Freedom Techniques) \u0219i Matrix Reimprinting. De-a lungul carierei mele, am avut oportunitatea de a ajuta oameni din \u00eentreaga lume s\u0103 \u00ee\u0219i transforme vie\u021bile, promov\u00e2nd armonia, iubirea \u0219i bun\u0103starea personal\u0103. Sunt, de asemenea, autoarea c\u0103r\u021bii \u201eRela\u021bia Perfect\u0103\u201d \u0219i am contribuit la \u00eembun\u0103t\u0103\u021birea rela\u021biilor personale \u0219i profesionale ale celor cu care am lucrat. Cred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 \u0219i conectarea cu energia interioar\u0103 sunt cheia succesului \u0219i a \u00eemplinirii.\n\n\u00cen cadrul acestui proiect, voi contribui cu ateliere de eliberare emo\u021bional\u0103 \u0219i energetic\u0103 construite pornind de la tehnicile \u00een care sunt certificat\u0103 pentru a ajuta membrii comunit\u0103\u021bii s\u0103 \u00ee\u0219i descopere \u0219i s\u0103 \u00ee\u0219i dep\u0103\u0219easc\u0103 blocajele interioare, construind o via\u021b\u0103 echilibrat\u0103 \u0219i armonioas\u0103. Aceste sesiuni vor fi concepute pentru a dezvolta abilit\u0103\u021bi practice \u0219i pentru a oferi instrumente eficiente de transformare personal\u0103.\n\nVoi aborda subiecte precum:\n\n1.\u2060 \u2060Eliberarea emo\u021biilor captive utiliz\u00e2nd Codul Emo\u021biilor.\n\n2.\u2060 \u2060Echilibrarea energetic\u0103 cu Body Code.\n\n3.\u2060 \u2060Transformarea credin\u021belor limitative cu ajutorul Belief Code \u0219i EFT.\n\n4.\u2060 \u2060\u00cembun\u0103t\u0103\u021birea rela\u021biilor personale \u0219i profesionale.\n\nSunt ner\u0103bd\u0103toare s\u0103 v\u0103 fiu al\u0103turi \u00een aceast\u0103 c\u0103l\u0103torie de cre\u0219tere personal\u0103 \u0219i s\u0103 v\u0103 ajut s\u0103 descoperi\u021bi puterea vindec\u0103rii interioare.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii. V\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\nVideo Introductiv\n\u00cenregistr\u0103ri Clase Online:\n\u00cenregistr\u0103ri clase online 2025\n\u00cenregistr\u0103ri clase online 2026\nDate de Contact","c":{"web":"relatiaperfecta.ro","fb":"relatiaperfecta.ro","yt":"dorelaiepan","tt":"dorelaiepan","ig":"relatiaperfecta.ro","li":"dorelaiepan","wa":"393757825022"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/677e57532a675_21.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfde298cf_4.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe1e2fee_5.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfd648a63_2.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323671":{"d":"Corina Benescu: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Corina Benescu, iar ast\u0103zi sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur acestei comunit\u0103\u021bi pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een cre\u0219terea \u00eencrederii \u00een sine.\n\nSunt pasionat\u0103 de psihologie de o via\u021b\u0103 \u00eentreag\u0103, iar timp de 16 ani am sus\u021binut emo\u021bional oamenii, ascult\u00e2ndu-le pove\u0219tile \u0219i ajut\u00e2ndu-i s\u0103 dep\u0103\u0219easc\u0103 obstacolele. De aproape doi ani, activez ca coach motiva\u021bional \u0219i am avut onoarea de a lucra al\u0103turi de Alina \u0218u\u021bu \u00een c\u00e2teva programe transformatoare. Cred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului, motiv pentru care sunt \u00een prezent student\u0103 la psihologie, dorindu-mi s\u0103 cunosc mai mult \u0219i s\u0103 ajut mai mult.\n\nCe vei descoperi \u00een cadrul sesiunilor mele: Voi preda tehnici practice pentru:\n\nDescoperirea resurselor emo\u021bionale.\n\nTransformarea obstacolelor \u00een resurse valoroase.\n\nIdentificarea pove\u0219tii personale ca surs\u0103 a puterii interioare.\n\nCum te pot ajuta sesiunile: Aceste sesiuni sunt concepute pentru a te ajuta s\u0103:\n\nLucrezi cu propria poveste, folosind tehnici prin care s\u0103 identifici resurse emo\u021bionale.\n\nTransformi resursele emo\u021bionale \u00een instrumente motiva\u021bionale.\n\n\u00cembr\u0103\u021bi\u0219ezi schimb\u0103rile din via\u021b\u0103 ca oportunit\u0103\u021bi de cre\u0219tere.\n\nRedescoperi \u0219i readuci bucuria \u00een via\u021ba ta.\n\nSubiectele abordate vor include:\n\nCre\u0219terea stimei de sine.\n\nIertarea.\n\nDep\u0103\u0219irea sindromului impostorului.\n\nGestionarea autosabotajului.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre.\n\nTe invit s\u0103 te al\u0103turi cursurilor noastre \u0219i s\u0103 vii cu \u00eentreb\u0103ri, pentru c\u0103 interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\n\nMul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026\nDate de Contact","c":{"fb":"CorinaBenescu","wa":"+40785417482"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/677708156b60b_27.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323673":{"d":"Gina Tatiana Petru\u021b: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Gina Tatiana Petru\u021b \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea din domeniul social.\n\nAm o experien\u021b\u0103 de 18 ani \u00een domeniul social \u0219i am avut oportunitatea de a lucra la funda\u021bii dedicate sprijinirii copiilor cu dizabilit\u0103\u021bi. Am colaborat cu Funda\u021bia Somaschi \u00een Rom\u00e2nia, apoi cu Asocia\u021bia Unitalsi \u0219i Sacro Cuore \u00een Italia, iar \u00een ultimii 4 ani activez \u00een Elve\u021bia, la Funda\u021bia Loverciano. De-a lungul carierei mele, am dezvoltat o pasiune profund\u0103 pentru dezvoltarea personal\u0103, psihologie \u0219i terapii holistice. \u00cen ultimii 2 ani, m\u0103 dedic \u00een mod special practicii NeuroGrafica, \u0219i cred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului.\n\n\u00cen cadrul acestui proiect, voi sus\u021bine sesiuni de ghidare personal\u0103 prin desen NeuroGrafica. Aceste sesiuni sunt concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103 descopere puterea NeuroGraficei. \u00cen cadrul sesiunilor noastre, ve\u021bi \u00eenv\u0103\u021ba s\u0103 transforma\u021bi emo\u021biile \u0219i blocajele \u00een claritate \u0219i echilibru, dezvolt\u00e2nd abilit\u0103\u021bi valoroase pentru via\u021ba personal\u0103 \u0219i rela\u021bional\u0103. Este o tehnic\u0103 creativ\u0103 ce v\u0103 ajut\u0103 s\u0103 v\u0103 explora\u021bi interiorul \u0219i s\u0103 g\u0103si\u021bi solu\u021bii noi prin desen \u0219i introspec\u021bie.\n\nVoi aborda subiecte precum:\n\n\u00b7 Reconectarea cu sinele\n\n\u00b7 Echilibrul \u00eentre via\u021ba personal\u0103 \u0219i profesional\u0103\n\n\u00b7 Rezolvarea fricilor \u0219i anxiet\u0103\u021bilor\n\nSunt ner\u0103bd\u0103toare s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de \u00eenv\u0103\u021bare.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online:\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026\nDate de Contact","c":{"fb":"profile.php","wa":"+0041774792297"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/678628e9eda65_45.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323674":{"d":"Cristina Badea: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Cristina Badea cu 20 de ani de experien\u021b\u0103 \u00een fashion \u0219i pasiunea mea pentru transformarea prin stil. Sunt \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre.\n\nDe-a lungul celor 20 de ani:\n\n\ud83d\udd39 Am \u00eembr\u0103cat peste 1 milion de femei, descop\u0103r tipologii diverse de stil, personalitate \u0219i expresie.\n\n\ud83d\udd39 Am generat v\u00e2nz\u0103ri de peste 1 milion de euro, prin companiile mele off-line \u0219i online\n\n\ud83d\udd39 Fondatoarea Live Studio ului de Stil Elite Brands, cu peste 1000 de produse, dedicat femeilor care vor s\u0103 se redescopere.\n\n\u00cen to\u021bi ace\u0219ti ani, am \u00eenv\u0103\u021bat c\u0103 stilul nu este doar despre tendin\u021be, ci despre cum hainele pot deveni aliatul t\u0103u \u00een a-\u021bi exprima personalitatea, feminitatea \u0219i \u00eencrederea.\n\nPasiunea mea nu se opre\u0219te la mod\u0103. Cred c\u0103 stilul exterior reflect\u0103 cine suntem cu adev\u0103rat \u00een interior. Pentru mine, stilul nu este despre tendin\u021be, ci despre cum te sim\u021bi \u00een pielea ta \u0219i cum te exprimi autentic prin ceea ce por\u021bi.\n\n\u00cen cadrul acestui proiect, voi sus\u021bine sesiuni care vor transforma nu doar garderoba ta, ci \u0219i felul \u00een care te vezi pe tine \u00eens\u0103\u021bi:\n\nCe voi preda?\n\n\ud83d\udd39 Reinventarea Garderobei \u2013 de la haos la armonie \u00een spa\u021biul t\u0103u personal.\n\n\ud83d\udd39 Puterea Transform\u0103rii prin Stil \u2013 cum s\u0103-\u021bi construie\u0219ti prezen\u021ba prin haine.\n\n\ud83d\udd39 Art\u0103 \u0219i \u0218tiin\u021b\u0103 \u00een Shopping \u2013 de la cump\u0103r\u0103turi compulsive la alegeri inteligente.\n\n\ud83d\udd39 Magia Culorilor \u2013 cum s\u0103 folose\u0219ti culorile pentru a te exprima cine esti cu adev\u0103rat.\n\n\ud83d\udd39 De la Garderob\u0103 la \u00cencredere \u2013 construie\u0219te un stil care inspir\u0103 \u0219i te reprezint\u0103.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre.\n\nV\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi sesiunilor mele, s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri \u0219i s\u0103 ne bucur\u0103m \u00eempreun\u0103 de o c\u0103l\u0103torie spre un stil care inspir\u0103 \u0219i o \u00eencredere autentic\u0103.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\nCu drag, Cristina Badea\n\nStyle Coach & Fondatoare Elite Brands\n\n\u00cenregistr\u0103ri Clase Online\nDate de Contact","c":{"fb":"Bcristinaadina"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/6786270aa3f44_43.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323678":{"d":"Georgeta Rotaru: Prezentare personal\u0103\n\nSalutare, oameni minuna\u021bi ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Georgeta Rotaru \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 fiu al\u0103turi de voi pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een Remodelarea creierului cu ajutorul Psihologiei Legilor Universale.\n\nCine sunt eu?\n\nAm absolvit Facultatea de Filosofie \u0219i Jurnalism, iar ulterior am urmat numeroase form\u0103ri profesionale, dintre care men\u021bionez:\n\nCoaching, Training\n\nPsihologia Legilor Universale\n\nCertificare interna\u021bional\u0103 \u00een Metoda Demartini\n\nReprogramare mental\u0103\n\nNeuro\u0219tiin\u021ba s\u0103n\u0103t\u0103\u021bii mintale\n\nBrain Remodeling Expert\n\nDincolo de diplome \u0219i certific\u0103ri, sunt o femeie care a pornit pe o c\u0103l\u0103torie de autocunoa\u0219tere \u0219i \u00eemplinire, ghidat\u0103 de curiozitatea de a descoperi de ce unii oameni reu\u0219esc s\u0103 tr\u0103iasc\u0103 o via\u021b\u0103 \u00eemplinit\u0103, iar al\u021bii nu.\n\nAm o experien\u021b\u0103 de 5 ani \u00een lucrul cu oamenii\u2013 at\u00e2t \u00een sesiuni individuale, c\u00e2t \u0219i de grup \u2013 ajut\u00e2ndu-i s\u0103 dep\u0103\u0219easc\u0103 provoc\u0103ri personale \u0219i s\u0103 ating\u0103 o via\u021b\u0103 aliniat\u0103 \u0219i \u00eemplinit\u0103.\n\nMisiunea mea este s\u0103 sprijin liderii \u0219i antreprenorii s\u0103-\u0219i identifice blocajele mentale \u0219i emo\u021bionale, s\u0103 le dep\u0103\u0219easc\u0103 \u0219i s\u0103 ob\u021bin\u0103 transform\u0103ri reale \u00een mintea lor. Cred cu t\u0103rie c\u0103 tu e\u0219ti liderul propriei vie\u021bi.\n\n\u00cen prezent, pentru a aprofunda \u00een\u021belegerea min\u021bii umane, sunt \u00een curs de formare ca Psihoterapeut Integrativ.\n\nCe vom explora \u00eempreun\u0103\n\n\u00cen cadrul acestui proiect, voi aborda teme esen\u021biale precum:\n\nEchilibrarea percep\u021biilor \u0219i influen\u021ba lor asupra deciziilor, ac\u021biunilor \u0219i rezultatelor noastre.\n\nIdentificarea percep\u021biilor dezechilibrate care \u00ee\u021bi limiteaz\u0103 poten\u021bialul.\n\nCum s\u0103 dep\u0103\u0219e\u0219ti procrastinarea cu ajutorul Legilor Universale.\n\nTehnici pentru men\u021binerea motiva\u021biei.\n\nCum s\u0103-\u021bi descoperi cadoul din fiecare traum\u0103.\n\nSistemul de valori \u2013 axa ta interioar\u0103 care te ghideaz\u0103 \u00een via\u021b\u0103.\n\nIdentificarea blocajelor mentale care te \u021bin la nivel de supravie\u021buire.\n\nCum s\u0103-\u021bi descoperi misiunea personal\u0103.\n\nVindecarea trecutului cu ajutorul Legilor Universale.\n\nTransformarea fricilor \u00een alia\u021bi de \u00eencredere.\n\nCum s\u0103 gestionezi Depresia \u0219i Anxietatea \u0219i s\u0103 descoperi mesajul ascuns din spatele acestora.\n\nPractici pentru autenticitate \u0219i leg\u0103tura acesteia cu sentimentele de vin\u0103 \u0219i ru\u0219ine.\n\nCum te voi ajuta?\n\nSesiunile noastre vor fi interactive \u0219i vor oferi:\n\nO mai bun\u0103 \u00een\u021belegere de sine.\n\nIdentificarea \u0219i dep\u0103\u0219irea blocajelor interioare.\n\nTehnici practice \u0219i eficiente pentru transformarea convingerilor subcon\u0219tiente.\n\nO viziune echilibrat\u0103 asupra vie\u021bii care s\u0103 sprijine succesul personal \u0219i profesional.\n\nSunt aici s\u0103 te inspir \u0219i s\u0103 te sus\u021bin \u00een c\u0103l\u0103toria ta de \u00eenv\u0103\u021bare, autocunoa\u0219tere \u0219i transformare. Calitatea vie\u021bii este dat\u0103 de calitatea \u00eentreb\u0103rilor pe care \u021bi le adresezi, a\u0219a c\u0103 te invit s\u0103 participi la \u00eent\u00e2lnirile noastre cu mintea deschis\u0103. Interac\u021biunea \u0219i deschiderea sunt esen\u021biale pentru rezultate transformatoare.\n\n\u00ce\u021bi mul\u021bumescpentru oportunitatea de a contribui la aceast\u0103 comunitate extraordinar\u0103\u0219i abia a\u0219tept s\u0103 ne cunoa\u0219tem, s\u0103 \u00eenv\u0103\u021b\u0103m \u0219i s\u0103 evolu\u0103m \u00eempreun\u0103!\n\nPe cur\u00e2nd! \ud83d\ude0a\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026\nMateriale utile\nIdentificarea t prin coaching \u0219i NLP,\n\nPrin ThetaHealing, am \u00eenv\u0103\u021bat s\u0103 m\u0103 aliniez cu cine sunt \u0219i s\u0103 simt energia femeilor cu care lucrez.\n\nHipnoza Eriksonian\u0103 mi-a oferit un instrument puternic pentru a ghida transform\u0103ri profunde \u0219i manifestarea autentic\u0103 a vie\u021bii dorite.\n\n\u00cen ace\u0219ti ani, am dezvoltat o pasiune profund\u0103 pentru a ajuta femeile s\u0103 \u00een\u021beleag\u0103 c\u0103 merit\u0103 s\u0103 se iubeasc\u0103 \u0219i s\u0103 se accepte exact a\u0219a cum sunt, c\u0103 pot tr\u0103i aliniate cu cine sunt cu adev\u0103rat, iar via\u021ba poate fi \u00een acela\u0219i timp frumoas\u0103 \u0219i u\u0219oar\u0103. Totul \u021bine de alegerile con\u0219tiente \u0219i zilnice pe care le facem fiecare dintre noi.\n\nCe vom explora \u00eempreun\u0103\n\n\u00cen cadrul acestui proiect, voi ajuta femeile moderne din aceast\u0103 comunitate s\u0103:\n\n\u00ce\u0219i reg\u0103seasc\u0103 echilibrul emo\u021bional\n\nSe reconecteze cu energia lor interioar\u0103\n\nTe voi ghida pas cu pas s\u0103:\n\n\u00ce\u021bi eliberezi emo\u021biile\n\nTr\u0103ie\u0219ti cu \u00eencredere \u0219i autenticitate\n\nFii prezent\u0103 \u00een fiecare zi\n\nTe iube\u0219ti \u0219i \u00ee\u021bi \u00eembr\u0103\u021bi\u0219ezi c\u0103l\u0103toria, aliniat\u0103 cu cine e\u0219ti cu adev\u0103rat.\n\nSubiectele pe care le vom aborda:\n\nDe unde \u0219i cu ce \u00eencepe manifestarea con\u0219tient\u0103 \u00een via\u021ba unei femei moderne\n\nCum po\u021bi s\u0103 te aliniezi cu rolurile tale de femeie din starea de prezen\u021b\u0103\n\nDe ce ai nevoie s\u0103-\u021bi ascul\u021bi corpul \u0219i cum s\u0103 \u00een\u021belegi mesajele pe care \u021bi le transmite\n\n8 pa\u0219i pentru a-\u021bi lua puterea \u00eenapoi \u0219i pentru a deveni o surs\u0103 de inspira\u021bie\n\nAutenticitatea ta este o putere, nu un punct slab\n\nCum s\u0103 eliberezi fricile care \u00ee\u021bi blocheaz\u0103 cre\u0219terea personal\u0103\n\nDe ce este esen\u021bial s\u0103 te prioritizezi \u0219i s\u0103 stabile\u0219ti limite s\u0103n\u0103toase \u00een rela\u021bia cu tine \u0219i cu ceilal\u021bi\n\nTehnici \u0219i practici pentru reconectarea la energia ta creatoare feminin\u0103, pe care o ai dintotdeauna \u00een interiorul t\u0103u\n\nAcestea sunt doar c\u00e2teva dintre temele pe care le vom aborda \u00een sesiunile de grup.\n\nSunt \u00eenc\u00e2ntat\u0103 s\u0103 fiu aici \u0219i s\u0103 am oportunitatea s\u0103-mi aduc contribu\u021bia \u00een aceast\u0103 comunitate de oameni frumo\u0219i. Abia a\u0219tept s\u0103 ne cunoa\u0219tem!\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026\nMateriale Utile\nEchilibrul \u00een via\u021ba femeii moderne\nReconecteaz\u0103-te cu tine \u0219i cu emo\u021biile tale\nS\u0103pt\u0103m\u00e2na 1\nDefine\u0219te-\u021bi limitele\nS\u0103pt\u0103m\u00e2na 2\nIdentific\u0103-\u021bi valorile\nS\u0103pt\u0103m\u00e2na 3\nRe\u00eentoarce-te \u00een corp\nS\u0103pt\u0103m\u00e2na 4\nRe\u00eentoarce-te \u00een corp\nMedita\u021bie ghidat\u0103\nJurnalul puterii mele interioare\nS\u0103pt\u0103m\u00e2na 5\nDate de Contact","c":{"pdf":"multiple","fb":"groups","tt":"tomasholesea4","wa":"+447737258928","pdfUrls":["https://d1yei2z3i6k35z.cloudfront.net/12980838/691cc3aab4150_BeigeMinimalistBusinessPlanPresentation_20251114_091907_0000.pdf","https://d1yei2z3i6k35z.cloudfront.net/12980838/69200bd972844_YellowandPeachCuteIllustrativeSelfCareSeminarPresentation_20251120_192258_0000.pdf","https://d1yei2z3i6k35z.cloudfront.net/12980838/6929c933843ee_WhiteandOrangeSimplePortfolioPresentation_20251127_145256_0000.pdf","https://d1yei2z3i6k35z.cloudfront.net/12980838/69200bd972844_YellowandPeachCuteIllustrativeSelfCareSeminarPresentation_20251120_192258_0000.pdf","https://d1yei2z3i6k35z.cloudfront.net/12980838/693c78ee0bdc8_PurpleandWhiteSimpleCleanUniversePresentation_20251212_132048_0000.pdf"]},  s\u0103:\n\n\u2714 Elimini fricile care te saboteaz\u0103 \u0219i \u00ee\u021bi blocheaz\u0103 succesul.\n\n\u2714 Reprogramezi g\u00e2ndurile limitative care \u00ee\u021bi men\u021bin via\u021ba \u00eentr-un cerc vicios.\n\n\u2714 \u00cen\u021belegi cum func\u021bioneaz\u0103 mintea ta \u0219i s\u0103 aplici metode eficiente de schimbare a mentalit\u0103\u021bii.\n\n\u2714 Ob\u021bii claritate \u0219i direc\u021bie \u00een toate aspectele vie\u021bii tale.\n\n\u2714 \u00ce\u021bi cre\u0219ti energia \u0219i vibra\u021bia, astfel \u00eenc\u00e2t s\u0103 atragi o via\u021b\u0103 mai bun\u0103, s\u0103n\u0103tate, rela\u021bii armonioase \u0219i abunden\u021b\u0103 financiar\u0103.\n\nVoi aborda subiecte precum:\n\n\ud83d\udd39 Leg\u0103tura dintre valoarea personal\u0103 \u0219i succesul \u00een toate domeniile vie\u021bii.\n\n\ud83d\udd39 Cum fricile ne saboteaz\u0103 \u0219i cum s\u0103 le transform\u0103m \u00een putere personal\u0103.\n\n\ud83d\udd39 Reprogramare mental\u0103 prin tehnici de NLP \u0219i neuroplasticitate.\n\n\ud83d\udd39 Cum s\u0103 tr\u0103ie\u0219ti \u00eentr-o stare de abunden\u021b\u0103 \u0219i s\u0103 evi\u021bi blocajele emo\u021bionale \u0219i financiare.\n\n\ud83d\udd39 Influen\u021ba alimenta\u021biei asupra st\u0103rii mentale \u0219i emo\u021bionale \u2013 cum s\u0103 alegi alimente cu vibra\u021bie \u00eenalt\u0103.\n\nSesiunile vor fi interactive \u0219i practice, cu metode aplicabile imediat, astfel \u00eenc\u00e2t s\u0103 nu r\u0103m\u00e2i doar cu entuziasmul de moment, ci s\u0103 ai un plan clar de ac\u021biune dup\u0103 fiecare \u00eent\u00e2lnire.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor mele \u0219i s\u0103 aduce\u021bi \u00eentreb\u0103rile \u0219i provoc\u0103rile voastre, pentru c\u0103 doar prin interac\u021biune putem cre\u0219te cu adev\u0103rat.\n\n
