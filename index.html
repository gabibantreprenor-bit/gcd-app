i ce trebuie s\u0103 fac\u0103 pentru a crea \u0219i experimenta realitatea pe care \u0219i-o doresc.\n\nVoi aborda subiecte precum:\n\nCe este \u201dTermostatul Financiar\u201d \u0219i cum \u00eel setezi pentru prosperitate.\n\n\u00cen ce fel ansamblul minte-corp te saboteaz\u0103 f\u0103r\u0103 s\u0103 \u0219tii \u00een atingerea obiectivelor \u0219i ce ai de f\u0103cut ca s\u0103 opre\u0219ti acest sabotaj \u0219i s\u0103-\u021bi atingi obiectivele.\n\nCum gestionezi din punct de vedere al emo\u021biilor negative momentele \u00een care ai provoc\u0103ri.\n\nCum \u00ee\u021bi creezi realitatea pe care o experimentezi, la propriu, prin intermediul g\u00e2ndurilor, vorbelor \u0219i ac\u021biunilor tale \u0219i care este leg\u0103tura \u00eentre acestea \u0219i rezultatele pe care le experimentezi.\n\nSunt ner\u0103bd\u0103tor s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de \u00eenv\u0103\u021bare!\n\nSunt foarte entuziasmat de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentrreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii. V\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online\nMateriale Utile\nLista convingeri\nEFT - Diverse Situa\u021bii\nTehnic\u0103 EFT\n6 EFT 5 Pasi\nMedita\u021bii ale Cafelei ghidate - Bac\u0219is\nMedita\u021bii ale Cafelei ghidate - Dona\u021bii\nPromovarea unui produs sau serviciu\nDate de Contact","c":{"pdfUrls":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67896bed8ae23_AAVP-Lista-convingeri.pdf","https://d1yei2z3i6k35z.cloudfront.net/3270029/67896be04ce10_EFTdiversesituatii.pdf"]},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/677e71d0135ce_39.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfde298cf_4.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png"]},"7323727":{"d":"Cristina Paraschivu: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Cristina Paraschivu \u0219i sunt foarte \u00eenc\u00e2ntata s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een domeniul financiar.\n\nTimp de 15 ani am acumulat experienta \u00een domeniul financiar si controling financiar \u0219i am avut oportunitatea de a lucra in mai multe multinationale din diverse arii. In ultimii ani am simtit sa fac schimbare semnificativa a stilului meu de viata, ca urmare, m-am \u201caruncat\u201d in anteprenoriat. Mi-am dorit sa fructific pasiunea mea pentru economie la modul cel mai util fiecarui individ sau familie ca si Consultant Financiar.\n\n\u00cen cadrul acestui proiect, voi preda Educatie Financiara. Aceste sesiuni vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii sa devina mai organizati si disciplinati in legatura cu banii lor, sa isi planifice atingerea obiectivelor viitoare si sa inteleaga notiuni si produse financiare de baza.\n\nVoi aborda subiecte precum precum bugetul personal, principii financiare, strategii sanatoase de achizitie a unei locuinte si modul in care gestionam un credit ipotecar, siguranta financiara, planificarea retragerii din activitate sau investitii. Sunt ner\u0103bd\u0103toare s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de \u00eenv\u0103\u021bare.\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67e6a90c0003a_CursurionlineGCD_totitrainerii1920x1080px.png"]},"7323728":{"d":"B\u0103rb\u0103tescu Nicoleta: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este B\u0103rb\u0103tescu Nicoleta \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur acestei comunit\u0103\u021bi minunate, pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een domeniul educa\u021biei financiare \u0219i al investi\u021biilor personale.\n\nAm o experien\u021b\u0103 de peste 10 ani \u00een educa\u021bie financiar\u0103 aplicat\u0103 \u0219i am avut oportunitatea de a sprijini zeci de persoane \u00een a-\u0219i pune ordine \u00een finan\u021bele personale \u0219i a face cu \u00eencredere primii pa\u0219i \u00een lumea investi\u021biilor.\n\nDe-a lungul timpului, am dezvoltat o pasiune autentic\u0103 pentru a traduce conceptele financiare \u00eentr-un limbaj simplu, clar \u0219i u\u0219or de aplicat. Cred cu t\u0103rie c\u0103 educa\u021bia financiar\u0103 este un pilon esen\u021bial al libert\u0103\u021bii personale \u0219i c\u0103 oricine poate \u00eenv\u0103\u021ba s\u0103-\u0219i creasc\u0103 banii \u2014 at\u00e2ta timp c\u00e2t beneficiaz\u0103 de ghidajul potrivit.\n\n\u00cen cadrul acestui proiect, voi sus\u021bine sesiuni menite s\u0103 \u00eei ajute pe oameni:\n\ns\u0103 \u00ee\u0219i \u00een\u021beleag\u0103 mai bine rela\u021bia cu banii,\n\ns\u0103 \u00ee\u0219i organizeze finan\u021bele personale,\n\ns\u0103 capete \u00eencredere \u00een propriile decizii financiare.\n\nVom lucra \u00eempreun\u0103 la mentalitatea legat\u0103 de bani, la formarea unor obiceiuri s\u0103n\u0103toase care pot aduce mai mult echilibru financiar, iar treptat vom face \u0219i primii pa\u0219i spre investi\u021bii \u2014 simplu, f\u0103r\u0103 presiune, cu explica\u021bii clare \u0219i accesibile.\n\nNu este nevoie s\u0103 ai experien\u021b\u0103. Este nevoie doar de deschidere \u0219i de dorin\u021ba de a \u00eenv\u0103\u021ba ceva care chiar \u00ee\u021bi poate \u00eembun\u0103t\u0103\u021bi via\u021ba de zi cu zi.\n\nAbia a\u0219tept s\u0103 ne cunoa\u0219tem \u0219i s\u0103 pornim \u00eempreun\u0103 pe acest drum spre mai mult\u0103 claritate, siguran\u021b\u0103 \u0219i \u00eencredere financiar\u0103!\n\n\u00cenregistr\u0103ri Clase Online","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/681f0b087829e_CursurionlineGCD_totitrainerii1920x1080px.png"]},"7323730":{"d":"Flavia Gozner: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Flavia Gozner, \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een reg\u0103sirea lini\u0219tii suflete\u0219ti \u0219i reconectarea cu propria persoan\u0103 dup\u0103 ce devii mam\u0103.\n\nAm o experien\u021b\u0103 de 4 ani \u00een lucrul cu mamele \u00een calitate de coach acreditat \u0219i am avut oportunitatea de a lucra at\u00e2t \u00een grupe de lucru, c\u00e2t \u0219i \u00een sesiuni 1 la 1. De-a lungul celor 19 ani de experien\u021b\u0103 ca \u0219i cadru didactic, am fost pasionat\u0103 de \u00een\u021belegerea rela\u021biei dintre copil \u0219i cadru didactic, iar mai apoi de rela\u021bia dintre mam\u0103 \u0219i copil. Am descoperit cum bun\u0103starea mamei influen\u021beaz\u0103 atmosfera din cas\u0103 \u0219i din familie. Odat\u0103 cu asumarea rolului de mam\u0103, \u00een urm\u0103 cu 11 ani, am continuat s\u0103 m\u0103 dezvolt pentru a deveni o versiune mai bun\u0103 a mea \u00een fiecare zi, iar acum sunt convins\u0103 c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului.\n\n\u00cen cadrul acestui proiect\n\nVoi preda ateliere de lucru dedicate femeilor, \u00een special mamelor. Aceste sesiuni vor fi concepute pentru a ajuta femeile din comunitate:\n\ns\u0103 se \u00een\u021beleag\u0103 mai bine pe ele \u00eensele,\n\ns\u0103 gestioneze emo\u021biile de vibra\u021bie joas\u0103,\n\ns\u0103-\u0219i g\u0103seasc\u0103 lini\u0219tea sufleteasc\u0103,\n\ns\u0103 fie mai prezente \u0219i con\u0219tiente \u00een via\u021ba de zi cu zi,\n\ns\u0103 \u00eembun\u0103t\u0103\u021beasc\u0103 rela\u021biile cu cei din jur,\n\n\u0219i s\u0103 g\u0103seasc\u0103 echilibrul \u00eentre via\u021ba personal\u0103 \u0219i cea profesional\u0103.\n\nSubiectele pe care le voi aborda includ:\n\n- Cum s\u0103-mi recap\u0103t lini\u0219tea sufleteasc\u0103 ca mam\u0103?\n\n- Gestionarea emo\u021biilor de vibra\u021bie joas\u0103: vinov\u0103\u021bie, fric\u0103, ru\u0219ine etc.\n\n- Cum s\u0103 am timp pentru toate?\n\n- Valorile personale \u0219i cum m\u0103 ghideaz\u0103 ele \u00een via\u021ba de zi cu zi.\n\n- Rela\u021bia cu copilul.\n\n- Rela\u021bia cu partenerul.\n\n- Tipare preluate de la mam\u0103.\n\n- Copilul meu: povar\u0103 sau binecuv\u00e2ntare?\n\n- Exerci\u021bii simple pentru mai mult\u0103 energie.\n\n- Descoperirea \u0219i schimbarea credin\u021belor limitative.\n\n- Iubirea de sine.\n\n- Echilibrul \u00eentre via\u021ba personal\u0103 \u0219i cea profesional\u0103.\n\nSunt foarte ner\u0103bd\u0103toare s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de \u00eenv\u0103\u021bare!\n\nSunt entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor mele \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim! \u2764\ufe0f\n\n\u00cenregistr\u0103ri Clase Online\nMateriale utile\nCREDINTE LIMITATIVE\n(atelier martie 2025)\nTEHNIC\u0102 CREDIN\u021aE LIMITATIVE\n(atelier 19 februarie 2026)\nMEDITA\u021aIE\n(atelier 19 februarie 2025)\nDate de Contact","c":{"pdf":"Tehnicadedescoperireacredintelorlimitative.pdf","web":"flaviagozner.com","fb":"suta.flavia","yt":"flaviagozner6929","wa":"+0750472422","pdfUrls":["https://d1yei2z3i6k35z.cloudfront.net/12980838/6998ba4be49b5_Tehnicadedescoperireacredintelorlimitative.pdf"]},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/6788c3192dd12_47.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfde298cf_4.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323731":{"d":"Andreea Enache: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Andreea Enache \u0219i sunt \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een dezvoltare personal\u0103 \u0219i parenting.\n\nCa \u0219i coach pentru mame extraordinare \u0219i consilier \u00een dezvoltare personal\u0103, \u00eemi dedic activitatea sprijinirii mamelor s\u0103 treac\u0103 de la sentimentul de cople\u0219ire \u0219i lips\u0103 de timp pentru ele \u00eensele la o via\u021b\u0103 de familie \u00eemplinit\u0103. Viziunea mea este s\u0103 creez un impact pozitiv asupra lumii prin sprijinirea mamelor, astfel \u00eenc\u00e2t copiii lor s\u0103 creasc\u0103 independen\u021bi, ferici\u021bi \u0219i \u00eencrez\u0103tori.\n\nAm o experien\u021b\u0103 de peste 4 ani \u0219i am colaborat cu organiza\u021bii precum Carrefour, \u00een proiecte dedicate mamelor. De asemenea, sunt creatoarea podcastului \u201eMam\u0103 \u00een Misiune\u201d \u0219i a mai multor programe \u0219i ghiduri destinate dezvolt\u0103rii personale a femeilor.\n\nDe-a lungul carierei mele, am urmat cursuri interna\u021bionale \u00een Positive Parenting, Conscious Parenting \u0219i Peaceful Parenting, dar \u0219i \u00een alte domenii complementare precum feminitate, NLP \u0219i public speaking. Aceast\u0103 diversitate \u00eemi permite s\u0103 ofer suport personalizat \u0219i eficient mamelor care \u00ee\u0219i doresc transformare autentic\u0103.\n\n\u00cen cadrul acestui proiect, voi sus\u021bine sesiuni care te vor ajuta s\u0103 :\n\n- gestionezi mai bine emo\u021biile,\n\n- s\u0103-\u021bi \u00eembun\u0103t\u0103\u021be\u0219ti rela\u021biile cu cei dragi,\n\n- s\u0103 g\u0103se\u0219ti echilibrul \u00eentre via\u021ba personal\u0103 \u0219i cea profesional\u0103.\n\nVom aborda subiecte precum:\n\n- gestionarea furiei,\n\n- dizolvarea vinov\u0103\u021biei,\n\n- \u00eembun\u0103t\u0103\u021birea rela\u021biei de cuplu\n\n- reducerea conflictelor cu copiii.\n\nSunt entuziasmat\u0103 de aceast\u0103 oportunitate de a contribui la dezvoltarea comunit\u0103\u021bii noastre \u0219i de a lucra \u00eempreun\u0103 pentru o via\u021b\u0103 mai bun\u0103. Te invit s\u0103 te al\u0103turi claselor mele \u0219i s\u0103 preg\u0103te\u0219ti \u00eentreb\u0103ri! \u00cempreun\u0103, putem face diferen\u021ba.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim! \u2764\ufe0f\n\n\u00cenregistr\u0103ri Clase Online\nDate de Contact","c":{"web":"andreeaenache.ro","yt":"UCUHQxFrpU6wdGJCjU0564ww","fb":"aandreeaenache","ig":"andreeaenacheibu","wa":"+40766843009"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/6788c3a1c59a6_48.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfde298cf_4.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323732":{"d":"R\u0103di\u021ba Toma: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit,\n\nSunt R\u0103di\u021ba Toma \u0219i m\u0103 bucur s\u0103 m\u0103 aflu al\u0103turi de aceast\u0103 comunitate pentru a contribui cu experien\u021ba \u0219i pasiunea mea \u00een domeniul dezvolt\u0103rii personale \u0219i transform\u0103rii emo\u021bionale.\n\nDe aproximativ 4 ani \u00eenso\u021besc oameni \u00een procesul de reconectare cu sinele autentic, clarificare a\n\nidentit\u0103\u021bii emo\u021bionale \u0219i eliberare a tiparelor care le influen\u021beaz\u0103 rela\u021biile. Am creat cursuri \u0219i ateliere menite s\u0103 sprijine reg\u0103sirea echilibrului interior \u0219i asumarea unei vie\u021bi tr\u0103ite con\u0219tient.\n\nCursuri dezvoltate\n\nFii prezent\u0103 \u00een via\u021ba ta \u2013 E unicul lucru care conteaz\u0103 cu adev\u0103rat\n\nFii tu \u00eensu\u021bi \u2013 Calea c\u0103tre suflet\n\nR\u0103d\u0103cina rela\u021biei cu tat\u0103l\n\nReg\u0103sirea sinelui dup\u0103 divor\u021b\n\nAteliere facilitate\n\nEmo\u021biile \u2013 barier\u0103 sau punte c\u0103tre o via\u021b\u0103 \u00eemplinit\u0103\n\nBlocajele \u0219i manifestarea abunden\u021bei interioare\n\nSpa\u021biul sacru \u00eentre ce a fost \u0219i ce urmeaz\u0103\n\n\u00cen dialog cu procrastinarea\n\nTrezirea iubirii de sine\n\nDincolo de r\u0103ni \u0219i frici \u2013 cum le dep\u0103\u0219im\n\nCe voi sus\u021bine \u00een cadrul acestui proiect\n\nTema central\u0103 a activit\u0103\u021bii mele este Identitatea personal\u0103 \u2013 fundamentul rela\u021biilor s\u0103n\u0103toase.\n\nCred c\u0103 rela\u021biile noastre reflect\u0103 claritatea sau confuzia identit\u0103\u021bii noastre. Atunci c\u00e2nd nu ne cunoa\u0219tem valorile, limitele \u0219i nevoile emo\u021bionale, rela\u021biile devin spa\u021bii de adaptare excesiv\u0103, dependen\u021b\u0103 sau conflict repetitiv.\n\nDemersul meu este centrat pe\n\nclarificarea identit\u0103\u021bii emo\u021bionale\n\ntransformarea convingerilor limitative\n\nintegrarea p\u0103r\u021bilor interioare neasumate\n\ndezvoltarea responsabilit\u0103\u021bii rela\u021bionale\n\nconstruirea unor limite s\u0103n\u0103toase\n\nAbordarea mea este una de dezvoltare personal\u0103 profund\u0103, orientat\u0103 spre autodescoperire \u0219i reconectare interioar\u0103. Integrez coaching \u0219i hipnoterapie orientat\u0103 spre resurse pentru a facilita accesul la nivelurile profunde ale sinelui, acolo unde se formeaz\u0103 tiparele rela\u021bionale \u0219i mecanismele de autoprotec\u021bie.\n\nIdentitatea emo\u021bional\u0103 reprezint\u0103 fundamentul acestui demers \u2013 capacitatea de a recunoa\u0219te, \u00een\u021belege \u0219i integra propriile tr\u0103iri, f\u0103r\u0103 a le proiecta asupra celorlal\u021bi sau a le reprima.\n\nCred c\u0103 rela\u021biile s\u0103n\u0103toase nu se construiesc prin adaptare continu\u0103, ci prin \u00eent\u00e2lnirea a dou\u0103 identit\u0103\u021bi asumate. C\u00e2nd identitatea este stabil\u0103, rela\u021bia devine un spa\u021biu de complementaritate, nu de pierdere de sine.\n\nSunt ner\u0103bd\u0103toare s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de autodescoperire \u0219i echilibrare, la nivelul identit\u0103\u021bii emo\u021bionale \u0219i al rela\u021biei autentice cu sine.\n\nCu pre\u021buire,\nR\u0103di\u021ba Toma\nSpecialist \u00een transformare emo\u021bional\u0103 \u0219i rela\u021bional\u0103\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026\nMateriale Utile\nMedita\u021bie suport 18.2.2025\nMedita\u021bie suport 5.3.2025\nMedita\u021bie suport 22.4.2025\nGHID\nMedita\u021bie suport 24.6.2025\nFI\u0218\u0102 DE LUCRU 24.6.2025\nDate de Contact","c":{"pdf":"ghidvarianta07.04simpla.pdf","tt":"rodica.toma50","fb":"Radita.Toma.74","wa":"+0724586894","pdfUrls":["https://d1yei2z3i6k35z.cloudfront.net/3270029/6808cecb53d7e_ghidvarianta07.04simpla.pdf"]},"img":["https://d1yei2z3i6k35z.cloudfront.net/12980838/69aa9d9bc6a27_GCDEvenimente.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe1e2fee_5.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7323733":{"d":"Mariana Stela Todorean: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Mariana Stela Todorean \u0219i sunt \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur vou\u0103 pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea despre comunicarea eficient\u0103 dintre p\u0103rin\u021bi \u0219i adolescen\u021bi.\n\nDespre mine\n\nLucrez cu adolescen\u021bi de peste 30 de ani, ca profesor, \u0219i le cunosc foarte bine frustr\u0103rile legate de comunicarea cu p\u0103rin\u021bii. La r\u00e2ndul meu, sunt mama a patru b\u0103ie\u021bi, acum adul\u021bi, \u0219i am trecut prin toate etapele dialogului cu ei. Am f\u0103cut gre\u0219eli, am \u00eenv\u0103\u021bat din ele \u0219i acum \u00eemi doresc s\u0103 creez o punte de leg\u0103tur\u0103 \u00eentre p\u0103rin\u021bi \u0219i copiii lor.\n\nPrin natura profesiei mele (profesor de religie \u0219i dezvoltare personal\u0103), am avut ocazia s\u0103 fiu aproape de adolescen\u021bi, s\u0103 \u00eei ascult \u0219i s\u0103 le \u00een\u021beleg provoc\u0103rile. Din dorin\u021ba de a ajuta c\u00e2t mai mul\u021bi p\u0103rin\u021bi s\u0103 \u00ee\u0219i \u00een\u021beleag\u0103 mai bine copiii, am absolvit Facultatea de Psihologie \u0219i sunt certificat\u0103 ca trainer, coach \u0219i speaker \u00een cadrul Maxwell Leadership Team Rom\u00e2nia.\n\nVom explora \u00eempreun\u0103:\n\n\u2714\ufe0f Tipurile de comportament ale adolescen\u021bilor \u0219i cum le putem \u00een\u021belege mai bine.\n\n\u2714\ufe0f Crizele specifice v\u00e2rstei \u0219i problemele cu care se confrunt\u0103.\n\n\u2714\ufe0f Cum r\u0103spundem noi, ca p\u0103rin\u021bi, \u00een fa\u021ba acestor provoc\u0103ri.\n\n\u2714\ufe0f Identificarea temperamentelor pentru a ne adapta comunicarea la nevoile lor reale.\n\nPoate c\u0103 ai un copil sensibil, care simte totul profund, sau unul activ, mereu \u00een mi\u0219care. Poate este sociabil \u0219i se hr\u0103ne\u0219te din rela\u021bii sau, dimpotriv\u0103, rezervat \u0219i analitic.\n\n\ud83d\udca1 Nu exist\u0103 un mod corect de a fi, dar exist\u0103 un mod corect de a comunica!\n\nDe ce s\u0103 participi?\n\n\ud83c\udf1f Pentru c\u0103 rela\u021bia p\u0103rinte-adolescent poate fi una armonioas\u0103, dac\u0103 \u0219tim s\u0103 comunic\u0103m eficient.\n\n\ud83c\udf1f Pentru c\u0103 \u00een\u021belegerea temperamentului copilului t\u0103u te va ajuta s\u0103-l sprijini \u00een cre\u0219terea sa.\n\n\ud83c\udf1f Pentru c\u0103 p\u0103rintele este primul model de comunicare al copilului \u0219i ceea ce \u00eenva\u021b\u0103 de la tine \u00eel va ghida \u00een rela\u021biile sale viitoare.\n\nSunt entuziasmat\u0103 s\u0103 \u00eencep aceast\u0103 c\u0103l\u0103torie cu voi \u0219i s\u0103 contribuim \u00eempreun\u0103 la dezvoltarea unei comunic\u0103ri autentice \u00een familie.\n\nV\u0103 invit s\u0103 participa\u021bi la cursurile noastre, s\u0103 adresa\u021bi \u00eentreb\u0103ri \u0219i s\u0103 interac\u021bion\u0103m \u2013 pentru c\u0103 adev\u0103rata \u00eenv\u0103\u021bare se na\u0219te din dialog!\n\n\u00cenregistr\u0103ri Clase Online\nMateriale utile\nMateriale suport\nMetode de afirmare a autorit\u0103\u021bii\nDate de contact","c":{"web":"comunicarecublandete.com","fb":"stela.todorean","tt":"mariana.st2","ig":"stelatodorean","wa":"+0756580202"},"img":["https://d1yei2z3i6k35z.cloudfront.net/3270029/67adcdce8071d_81.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe1e2fee_5.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"7435703":{"d":"Adela Gheorma: Prezentare personal\u0103\n\nSalutare, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\n\n\nNumele meu este Adela Gheorma, iar ast\u0103zi sunt foarte bucuroas\u0103 s\u0103 m\u0103 al\u0103tur acestei frumoase comunit\u0103\u021bi pentru a \u00eemp\u0103rt\u0103\u0219i cu voi din cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een domeniul coachingului spiritual \u0219i al dezvolt\u0103rii personale.\n\nSunt absolvent\u0103 a Academiei de Coaching Spiritual \u0219i, de-a lungul anilor, am aprofundat diverse direc\u021bii care sprijin\u0103 procesul de transformare interioar\u0103, printre care:\n\n\u201eVindec\u0103-\u021bi traumele din copil\u0103rie\u201d\n\n\u201eCum s\u0103 fii propriul t\u0103u coach\u201d\n\nTehnici de terapie energetic\u0103 \u0219i NLP (Programare Neuro-Lingvistic\u0103)\n\nPrin formarea \u00een NLP, am dob\u00e2ndit competen\u021be solide \u00een:\n\nTehnici de comunicare eficient\u0103 \u0219i convingere\n\nPsihologia obiectivelor \u0219i a motiva\u021biei\n\nDezvoltarea inteligen\u021bei emo\u021bionale\n\nPsihologia rela\u021biilor \u0219i armonizarea acestora\n\nDe-a lungul carierei mele, am sus\u021binut sesiuni individuale, ateliere de grup \u0219i cursuri pentru cei care caut\u0103 echilibrul interior \u0219i reconectarea cu sinele autentic. Misiunea mea este de a crea un spa\u021biu sigur \u0219i ghidat pentru cei care \u00ee\u0219i doresc mai mult\u0103 claritate, prezen\u021b\u0103 \u0219i bucurie \u00een via\u021ba de zi cu zi.\n\n\u00cen cadrul acestui proiect, v\u0103 voi introduce \u00een cursul meu: \u201eArta Bucuriei\u201d - un program transformator dedicat celor care simt c\u0103 \u0219i-au pierdut bucuria \u2013 nu ca emo\u021bie trec\u0103toare, ci ca stare de fiin\u021bare autentic\u0103.\n\nVom explora \u00eempreun\u0103:\n\nCum s\u0103 reg\u0103sim bucuria ca stare natural\u0103 de prezen\u021b\u0103 \u0219i conexiune\n\nCum ne-au influen\u021bat tiparele, fricile \u0219i condi\u021bion\u0103rile\n\nCum putem transforma aceast\u0103 con\u0219tientizare \u00eentr-un stil de via\u021b\u0103 echilibrat\n\nVe\u021bi \u00eenv\u0103\u021ba \u0219i practica al\u0103turi de mine:\n\nExerci\u021bii de respira\u021bie con\u0219tient\u0103\n\nMedita\u021bii ghidate\n\nRitualuri zilnice pentru reconectare\n\nJournaling intuitiv\n\nLucrul cu arhetipurile interioare\n\nAceste instrumente v\u0103 vor ajuta s\u0103 v\u0103 cultiva\u021bi o rela\u021bie profund\u0103 cu voi \u00een\u0219iv\u0103, s\u0103 accesa\u021bi bucuria chiar \u0219i \u00een perioadele dificile \u0219i s\u0103 v\u0103 deschide\u021bi c\u0103tre o via\u021b\u0103 tr\u0103it\u0103 cu mai mult\u0103 claritate \u0219i autenticitate.\n\nVom aborda teme esen\u021biale precum:\n\nBucuria ca stare de con\u0219tiin\u021b\u0103\n\nObstacolele incon\u0219tiente \u00een calea bucuriei\n\nVindecarea rela\u021biei cu copilul interior\n\nPuterea prezen\u021bei \u0219i a recuno\u0219tin\u021bei\n\nCum s\u0103 cultiv\u0103m ritualuri zilnice care ne \u00eent\u0103resc echilibrul\n\nAlegerea bucuriei ca practic\u0103 spiritual\u0103 zilnic\u0103\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a contribui la dezvoltarea voastr\u0103 \u0219i a comunit\u0103\u021bii noastre.\n\n\nV\u0103 invit cu drag s\u0103 v\u0103 al\u0103tura\u021bi cursurilor mele \u0219i s\u0103 veni\u021bi cu \u00eentreb\u0103ri, reflec\u021bii \u0219i deschidere \u2013 pentru c\u0103 interac\u021biunea \u0219i \u00eemp\u0103rt\u0103\u0219irea autentic\u0103 sunt cheia transform\u0103rii.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne cunoa\u0219tem!\n\nCu bl\u00e2nde\u021be \u0219i bucurie,\nAdela Gheorma\n\n\u00cenregistr\u0103ri Clase Online\n\u00cenregistr\u0103ri Clase Online 2025\n\u00cenregistr\u0103ri Clase Online 2026\nDate de Contact","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/12980838/6893a299c7733_CursurionlineGCD_totitrainerii1920x1080px1.png"]},"7448811":{"d":"Lucica \u0218ofran: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Lucica \u0218ofran \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een autocunoa\u0219tere. Este o experien\u021b\u0103 pe care am acumulat-o \u00een peste 30 de ani de lucru cu mine \u0219i peste 2 ani de c\u00e2nd lucrez cu oamenii ca \u0219i Ghid \u0219i mentor \u00een Autocunoa\u0219tere.\n\nDe-a lungul carierei mele, am dezvoltat o pasiune profund\u0103 pentru lucrul cu oamenii, am preg\u0103tit \u0219i coordonat echipe de v\u00e2nz\u0103ri, mai apoi echipe de implementare proiecte europene.\n\n\n\u00cen urm\u0103 cu 8 ani mi-am luat calificarea ca \u0219i cpnsilier pentru dezvoltare personal\u0103 \u0219i de 2 ani lucrez cu oamenii \u0219i cred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului. Practic \u00eenv\u0103\u021barea continu\u0103 din anul 1992.\n\n\u00cen cadrul acestui proiect, voi sus\u021bine o serie de ateliere lunare, av\u00e2nd ca \u0219i tem\u0103 de baz\u0103 \u00a0 Timp cu tine. Aceste ateliere vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103:\n\n- se reconecteze cu sinele autentic prin crearea spa\u021biului necesar pentru a se asculta cu adev\u0103rat, dincolo de zgomotul cotidian. Prin exerci\u021bii de reflec\u021bie \u0219i prezen\u021b\u0103 con\u0219tient\u0103, \u00ee\u0219i vor re/descoperi valorile, dorin\u021bele \u0219i nevoile reale.\n\n- ob\u021bin\u0103 claritate emo\u021bional\u0103 \u0219i mental\u0103\u00a0 prin \u00een\u021belegerea mai profund\u0103 a propriilor emo\u021bii \u0219i g\u00e2nduri. Prin dialoguri ghidate \u0219i practici creative, participan\u021bii vor afla cum s\u0103-\u0219i gestioneze mai bine st\u0103rile interioare \u0219i s\u0103 ia decizii aliniate cu ei \u00een\u0219i\u0219i \u0219i cu valorile lor personale.\n\n- ob\u021bin\u0103 sprijin \u0219i apartenen\u021b\u0103 \u00eentr-un spa\u021biu sigur, grupul de lucru, care devine un spa\u021biu de sus\u021binere, unde fiecare se simte v\u0103zut \u0219i auzit. Participan\u021bii vor experimenta conexiuni autentice, \u00een care vulnerabilitatea este \u00eent\u00e2mpinat\u0103 cu respect \u0219i empatie.\n\nVoi aborda subiecte precum:\n- Alege binele, chiar \u0219i c\u00e2nd ziua nu e perfect\u0103\u00a0\n\n- Fii tu, chiar dac\u0103 e\u0219ti judecat(\u0103)\u00a0\n\n- Valoarea ta o decizi tu\n\n- Nu mai lupta cu tine \u2014 g\u0103se\u0219te lini\u0219tea\n\n- Las\u0103 trecutul s\u0103 plece\n\n- Treze\u0219te-te diminea\u021ba cu sens\n\n- Ia via\u021ba \u00een m\u00e2inile tale\n\n- Tr\u0103ie\u0219te cum sim\u021bi, nu cum \u021bi se cere\n\nS\u00eent ner\u0103bd\u0103toare s\u0103 v\u0103 ghidez \u00een aceast\u0103 c\u0103l\u0103torie de cunoa\u0219tere a Universului interior \u0219i autocunoa\u0219tere.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor, programelo \u0219i atelierelor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online\nDate de Contact","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/12980838/689f3a23f1c08_CursurionlineGCD_totitrainerii1920x1080px2.png"]},"8324992":{"d":"Teodora Chiorescu: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Chiorescu Teodora-Cristina \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur acestei comunit\u0103\u021bi pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een Psihologie, \u00een special \u00een traumele din copil\u0103rie, terapia p\u0103r\u021bilor \u0219i psihoterapia transgenera\u021bional\u0103.\n\nAm o experien\u021b\u0103 de 5 ani \u00een coaching, sunt psiholog clinician \u0219i m\u0103 formez \u00een psihoterapia rela\u021biilor. Am avut oportunitatea de a lucra ca mentor \u00een programul \u201eVindec\u0103-\u021bi traumele din copil\u0103rie\u201d (din 2021 p\u00e2n\u0103 \u00een prezent) \u0219i de a urma cursuri precum NLP, terapia traumelor transgenera\u021bionale, ateliere de \u0219amanism, integrarea amintirilor traumatice \u0219i coaching spiritual.\n\nAm creat \u0219i facilitat trei edi\u021bii ale programului \u201eTreci prin durere \u0219i descoper\u0103-\u021bi adev\u0103ratul poten\u021bial\u201d, precum \u0219i ateliere dedicate metodei Rewind pentru integrarea amintirilor traumatice.\n\nDe-a lungul carierei, am dezvoltat o pasiune profund\u0103 pentru terapia traumei transgenera\u021bionale, lucrul cu p\u0103r\u021bile interioare (IFS / sisteme familiale interne) \u0219i ghidarea oamenilor s\u0103-\u0219i trateze cu iubire p\u0103r\u021bile exilate \u0219i \u201edu\u0219manii interiori\u201d.\n\nCred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este esen\u021bial\u0103 \u2014 asemenea unui \u201edu\u0219 zilnic\u201d pentru psihic.\n\nCe vom lucra \u00een cadrul acestui proiect\n\nVom explora modul \u00een care po\u021bi lucra cu p\u0103r\u021bile tale astfel \u00eenc\u00e2t s\u0103:\n\nle identifici mesajul,\n\nle transformi \u00een alia\u021bi,\n\nle faci s\u0103 lucreze pentru binele t\u0103u suprem.\n\nVom descoperi \u00eempreun\u0103:\n\ncapcane mentale care limiteaz\u0103 prosperitatea,\n\nmodul \u00een care emo\u021biile ne influen\u021beaz\u0103 deciziile,\n\nteste clinice pentru evaluarea nivelului de anxietate, depresie \u0219i stiluri de ata\u0219ament,\n\nde ce nu exist\u0103 p\u0103r\u021bi \u201erele\u201d, ci doar p\u0103r\u021bi r\u0103nite care au nevoie de \u00een\u021belegere,\n\ncum s\u0103 r\u0103spundem evenimentelor \u00een loc s\u0103 reac\u021bion\u0103m automat din r\u0103ni nelucrate.\n\nTemele pe care le vom aprofunda\n\nDescrierea p\u0103r\u021bilor \u0219i rolul fiec\u0103reia.\n\nCinci lucruri esen\u021biale despre p\u0103r\u021bile interioare.\n\nLucru cu subcon\u0219tientul prin induc\u021bii ghidate personalizate pe frici.\n\nImpactul traumelor din copil\u0103rie \u00een rela\u021biile \u0219i via\u021ba adult\u0103.\n\nEchilibrare prin Legile Universale.\n\nLucru cu emo\u021biile care blocheaz\u0103 prosperitatea.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a lucra \u00eempreun\u0103 \u0219i de a contribui la evolu\u021bia acestei comunit\u0103\u021bi.\n\nV\u0103 invit s\u0103 participa\u021bi cu deschidere \u0219i curiozitate \u0219i s\u0103 veni\u021bi cu \u00eentreb\u0103ri, pentru c\u0103 interac\u021biunea este cheia transform\u0103rii.\n\nAbia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online\nDate de Contact","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/12980838/69307dbe32a17_EvenimentGeorgetaRotaru.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"8324994":{"d":"Isabela Elena Moraru: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Isabela Elena Moraru \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een terapiile holistice, precum Naturopatia \u0219i Terapiile Complementare, iar ca specialitate am ales instrumentul terapeutic al Constela\u021biilor Familiale.\n\nAm o experien\u021b\u0103 de doi ani \u00een Constela\u021bii Familiale \u0219i Naturopatie, pentru c\u0103 am ales s\u0103 devin terapeut holistic \u00een anul 2021, c\u00e2nd am \u00eenceput s\u0103 studiez Naturopatia, dup\u0103 care m-am certificat \u00een Constela\u021bii Familiale. Am avut \u00eens\u0103 oportunitatea de a \u00eenv\u0103\u021ba de la mul\u021bi speciali\u0219ti interna\u021bionali \u00een medicina natural\u0103 \u00eenc\u0103 din anul 2017, c\u00e2nd am devenit membru al comunit\u0103\u021bii Companiei 4Life Research din USA, \u00een urma unei complica\u021bii \u00een s\u0103n\u0103tatea mea, c\u00e2nd am fost diagnosticat\u0103 cu fibromialgie, iar medicina clasic\u0103 nu dispunea de solu\u021bii pentru acest diagnostic.\n\nA\u0219a am decis s\u0103 caut o solu\u021bie alternativ\u0103, s\u0103 \u00eenv\u0103\u021b ce anume se afl\u0103 \u00een spatele acestui diagnostic \u0219i s\u0103 \u00eenv\u0103\u021b s\u0103-mi nutresc organismul cu nutrien\u021bi specifici pentru ca organismul meu s\u0103 \u00eenceap\u0103 s\u0103 se vindece. De aici a pornit marea mea c\u0103l\u0103torie \u00een terapiile holistice.\n\nDe-a lungul acestei c\u0103l\u0103torii, am dezvoltat o pasiune profund\u0103 pentru Constela\u021biile Familiale, deoarece aceast\u0103 metod\u0103 lucreaz\u0103 mult mai profund la nivel energetic. Studiez \u00een continuare instrumente terapeutice pentru traum\u0103 \u0219i cred cu t\u0103rie c\u0103 \u00eenv\u0103\u021barea continu\u0103 este cheia succesului.\n\nCe vom lucra \u00een cadrul acestui proiect\n\n\u00cen cadrul acestui proiect, vreau s\u0103 aduc la cuno\u0219tin\u021b\u0103 tuturor cum func\u021bioneaz\u0103 \u00een interiorul nostru terapia sistemic\u0103 a Constela\u021biilor Familiale. Aceste sesiuni vor fi concepute pentru a ajuta membrii comunit\u0103\u021bii s\u0103 descopere principiile terapiei sistemice \u0219i modul \u00een care aceasta lucreaz\u0103 la nivel personal, familial \u0219i colectiv.\n\nTemele pe care le vom aborda\n\nApartenen\u021ba \u00een sistemul familial\n\nImportan\u021ba ierarhiei \u00een familie\n\nEchilibrul dintre a da \u0219i a primi \u00een rela\u021bii\n\nArmonia \u00een rela\u021biile cu p\u0103rin\u021bii, copiii \u0219i partenerii de via\u021b\u0103\n\nArmonizarea rela\u021biilor laborale sau de business\n\nCum ne influen\u021beaz\u0103 sistemul familial la nivel profund \u0219i energetic\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre.\n\nV\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online\nDate de Contact","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/12980838/691f58eed64e5_GCDEvenimente3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfd648a63_2.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"8325047":{"d":"Maria Gora: Prezentare personal\u0103\n\nBun\u0103 ziua, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\u00a0\n\n\nSunt Maria Gora \u0219i m\u0103 bucur nespus s\u0103 fiu aici, \u00een acest spa\u021biu plin de oameni care caut\u0103, cresc \u0219i aleg s\u0103 tr\u0103iasc\u0103 con\u0219tient \u0219i diferit.\n\n\nVin spre voi cu bucuria de a \u00eemp\u0103rt\u0103\u0219i o parte din munca mea de suflet \u2013 aceea de a ghida femeile s\u0103 se \u00eentoarc\u0103 la ele \u00eensele, dup\u0103 perioade \u00een care s-au pierdut \u00een roluri, griji \u0219i responsabilit\u0103\u021bi.\n\nAm peste 3 ani de experien\u021b\u0103 \u00een lucrul cu oamenii \u0219i, \u00een mod special, cu femei care, de\u0219i par s\u0103 aib\u0103 totul \u2013 familie, carier\u0103, stabilitate \u2013 simt \u00een interior un gol, o oboseal\u0103, o deconectare de la cine sunt cu adev\u0103rat. Am trecut eu \u00eens\u0103mi prin acele st\u0103ri de epuizare \u0219i pierdere de sens, p\u00e2n\u0103 c\u00e2nd corpul \u0219i sufletul m-au oprit \u0219i m-au invitat s\u0103 m\u0103 reg\u0103sesc, s\u0103 m\u0103 recl\u0103desc.\n\n\nAst\u0103zi, \u00een activitatea mea de Life Coach, creez spa\u021bii sigure pentru ca femeile s\u0103-\u0219i aud\u0103 din nou vocea, s\u0103-\u0219i recunoasc\u0103 nevoile \u0219i s\u0103 se reconecteze la bucurie, iubire \u0219i autenticitate.\n\n\u00cen cadrul acestui proiect, voi sus\u021bine o serie de clase dedicate reconect\u0103rii cu sine \u0219i cultiv\u0103rii echilibrului interior \u2014 mai exact, cum po\u021bi, chiar \u0219i \u00een mijlocul agita\u021biei zilnice, s\u0103 revii la tine f\u0103r\u0103 vin\u0103, f\u0103r\u0103 presiune \u0219i f\u0103r\u0103 perfec\u021bionism.\n\nVom explora \u00eempreun\u0103:\n\u2665 Cum s\u0103-\u021bi ascul\u021bi corpul \u0219i semnalele lui \u00eenainte de a ceda epuiz\u0103rii.\n\u2665\u00a0 Cum s\u0103-\u021bi recape\u021bi \u00eencrederea \u0219i stima de sine.\n\n\u2665 Cum s\u0103 \u00eenve\u021bi s\u0103 spui \u201eda\u201d \u021bie f\u0103r\u0103 s\u0103 sim\u021bi c\u0103 \u00eei tr\u0103dezi pe ceilal\u021bi.\n\u2665\u00a0 Cum s\u0103 aduci sens, bucurie \u0219i prezen\u021b\u0103 \u00een via\u021ba de zi cu zi, chiar \u0219i c\u00e2nd pare c\u0103 nu ai timp.\n\nSesiunile vor fi interactive, autentice \u0219i profunde \u2013 cu exerci\u021bii simple, dar transformatoare, \u0219i cu reflec\u021bii care ating sufletul.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a \u00eemp\u0103rt\u0103\u0219i din experien\u021ba mea cu voi \u0219i de a contribui la evolu\u021bia unei comunit\u0103\u021bi care crede \u00een cre\u0219tere prin con\u0219tien\u021b\u0103 \u0219i curaj.\n\n\nV\u0103 invit s\u0103 veni\u021bi cu inimile deschise \u0219i s\u0103 v\u0103 permite\u021bi s\u0103 fi\u021bi curio\u0219i \u2014 despre voi, despre emo\u021biile voastre, despre drumul vostru.\n\nAbia a\u0219tept s\u0103 ne cunoa\u0219tem \u00een clas\u0103 \u0219i s\u0103 pornim \u00eempreun\u0103 \u00een aceast\u0103 c\u0103l\u0103torie spre \u201eacas\u0103, \u00een tine\u201d.\n\n\u00cenregistr\u0103ri Clase Online\nDate de Contact","c":{},"img":["https://d1yei2z3i6k35z.cloudfront.net/12980838/691f5a3e1a691_GCDEvenimente2.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfd648a63_2.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]},"8856051":{"d":"Zenaida Laz\u0103r : Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este, Zenaida Laz\u0103r \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een domeniul psiho-numerologiei,sunt un ghid al evolu\u021biei personale prin Numerologie Aplicat\u0103.\n\nDin pasiunea de a cunoaste mai bine omul si trecerea lui prin viata, am studiat psihologia, am urmat cursuri NLP \u00een \u021bar\u0103 \u0219i \u00een str\u0103in\u0103tate, de inteligen\u021b\u0103 emo\u021bional\u0103, de hipnoz\u0103 si numerologie.\n\nA fost o perioad\u0103 de studiu intens, meticulos \u0219i profund. Nu am tratat numerologia ca pe o curiozitate, ci ca pe o \u0219tiin\u021b\u0103 \u00een toat\u0103 puterea cuv\u00e2ntului.\n\nAm decodificat h\u0103r\u021bi personale, am analizat matrice numerologice, perioade evolutive de 7 si 9 ani, vibra\u021bii interioare. Am analizat destinul meu, apoi destinul celor din jur, p\u00e2n\u0103 c\u00e2nd totul a \u00eenceput s\u0103 capete sens.\n\nAm descoperit Ordinea din povestea mea. Am descifrat Via\u021ba mea \u00een cifre. Am \u00een\u021beles de ce am deviat de pe drum, ce aveam de \u00eenv\u0103\u021bat \u0219i cum s\u0103 m\u0103 \u00eentorc \u00eenapoi la mine.\n\n\u0218i atunci am \u0219tiut c\u0103 aceast\u0103 cunoa\u0219tere nu poate r\u0103m\u00e2ne doar a mea.\n\nCe fac ast\u0103zi!\n\nPredau numerologie aplicat\u0103 \u00eentr-un mod diferit de tot ce ai \u00eent\u00e2lnit p\u00e2n\u0103 acum.\n\nNu predau din c\u0103r\u021bi. Predau din experien\u021b\u0103. Predau din cazuistic\u0103 real\u0103. Predau din transform\u0103ri pe care le-am tr\u0103it \u0219i eu, \u0219i cei cu care am lucrat individual.\n\nStilul meu \u00eembin\u0103 logica limpede cu intui\u021bia profund\u0103, bl\u00e2nde\u021bea cu fermitatea, explica\u021bia cu aplicarea. Sunt direct\u0103, dar cald\u0103. Clar\u0103, dar profund\u0103. Le ofer oamenilor instrumente, nu teorii frumos ambalate.\n\nCei care aplic\u0103 \u2014 nu doar ascult\u0103 \u2014 \u00ee\u0219i schimb\u0103 via\u021ba. \u00cemi mul\u021bumesc pentru c\u0103 au primit \u00een m\u00e2ini o unealt\u0103 care func\u021bioneaz\u0103, zi de zi, \u00een via\u021ba real\u0103.\n\n\u00cen cadrul acestui proiect, voi preda numerologia pe \u00een\u021belesul tuturor.\n\n\u00cen aceste sesiuni m\u0103 voi concentra pe a aduce claritate membrii comunit\u0103\u021bii care simt c\u0103 au r\u0103t\u0103cit drumul, le descifrez misiunea pe care au din prima zi a vie\u021bii lor, dar nu \u0219tiau s\u0103 o citeasc\u0103.\n\nPentru diferitele \u00eent\u00e2mpl\u0103ri din via\u021ba fiec\u0103ruia, rela\u021bii, ne\u00eempliniri profesionale, confuzie, depresie sau anxietate, lips\u0103 de sens sau sentimentul c\u0103 \u201eau ratat ceva\u201d, le ar\u0103t exact:\n\n\u2013 ce au tr\u0103it, \n\n\u2013 de ce a fost necesar, \n\n\u2013 ce \u00eenseamn\u0103 \u00een logica destinului lor, \n\n\u2013 \u0219i cum pot rescrie viitorul f\u0103r\u0103 s\u0103 repete trecutul.\n\nEle \u00eenva\u021b\u0103 s\u0103 anticipeze, nu doar s\u0103 reac\u021bioneze. S\u0103 recunoasc\u0103 oportunit\u0103\u021bile \u00een timp real, nu dup\u0103 ce au trecut. S\u0103 \u00een\u021beleag\u0103 lec\u021biile, ciclurile, anii personali, pragurile \u0219i vibra\u021biile care le modeleaz\u0103 via\u021ba.\n\nDup\u0103 training, femeile pleac\u0103 cu ordine \u00een povestea lor, cu claritate \u00een direc\u021bie \u0219i cu o hart\u0103 a evolu\u021biei personale pe care o pot folosi toat\u0103 via\u021ba.\n\nNumerologia devine pentru ele un mod de g\u00e2ndire, un sistem de decizie \u0219i un instrument de transformare profund\u0103.\n\nSunt un ghid al evolu\u021biei personale prin numerologie aplicat\u0103. \u00ce\u021bi ar\u0103t drumul, \u00ee\u021bi explic harta, \u00ee\u021bi dezv\u0103lui logica destinului t\u0103u \u0219i te \u00eenv\u0103\u021b s\u0103 navigi prin via\u021b\u0103 cu \u00eencredere, luciditate \u0219i sens.\n\nNu-\u021bi dau predic\u021bii. \u00ce\u021bi dau putere.\n\nNu-\u021bi spun ce urmeaz\u0103. \u00ce\u021bi ar\u0103t cum s\u0103 \u00een\u021belegi singur\u0103.\n\nNu-\u021bi promit miracole. \u00ce\u021bi ofer un sistem precis, clar, testat \u2014 \u0219i o nou\u0103 perspectiv\u0103 asupra existen\u021bei tale.\n\nSunt foarte entuziasmat\u0103 de aceast\u0103 oportunitate de a colabora cu voi \u0219i de a contribui la dezvoltarea comunit\u0103\u021bii noastre. V\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi cursurilor noastre \u0219i s\u0103 preg\u0103ti\u021bi \u00eentreb\u0103ri, deoarece interac\u021biunea este cheia \u00eenv\u0103\u021b\u0103rii.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim!\n\n\u00cenregistr\u0103ri Clase Online\nMateriale Utile\nDe ce renun\u021bi\nCe verdict ai acceptat\nCum \u00ee\u021bi sabotezi succesul","c":{"pdf":"Decerenunti.pdf,CeverdictaiacceptatPDF.pdf,Cumitisabotezisuccesul1.pdf","pdfUrls":["https://d1yei2z3i6k35z.cloudfront.net/12980838/68a82f720c427_Decerenunti.pdf","https://d1yei2z3i6k35z.cloudfront.net/12980838/68b0726175c8f_CeverdictaiacceptatPDF.pdf","https://d1yei2z3i6k35z.cloudfront.net/12980838/68c55b7b561df_Cumitisabotezisuccesul1.pdf"]},"img":["https://d1yei2z3i6k35z.cloudfront.net/12980838/696f5dffb8ab0_GCDVideo1.png"]},"9175283":{"d":"Alice Macrina Cucu: Prezentare personal\u0103\n\nBun\u0103, dragi membri ai comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit!\n\nNumele meu este Alice Macrina Cucu \u0219i sunt foarte \u00eenc\u00e2ntat\u0103 s\u0103 m\u0103 al\u0103tur comunit\u0103\u021bii voastre pentru a \u00eemp\u0103rt\u0103\u0219i cuno\u0219tin\u021bele \u0219i experien\u021ba mea \u00een domeniul dezvolt\u0103rii emo\u021bionale, mentale \u0219i identitare a femeii care devine mam\u0103.\n\nSunt Psiholog, Life Coach, Consilier pentru Dezvoltare Personal\u0103 \u0219i Voca\u021bional\u0103, Formator, dar \u0219i mam\u0103 \u0219i so\u021bie.\n\nAm peste 15 ani de experien\u021b\u0103 \u00een lucrul cu oamenii, at\u00e2t \u00een sesiuni individuale, c\u00e2t \u0219i \u00een grupuri de dezvoltare.\n\nDe-a lungul carierei mele, am lucrat cu femei aflate \u00een momente de tranzi\u021bie profund\u0103 \u2013 iar maternitatea este una dintre cele mai intense \u0219i transformatoare etape din via\u021ba unei femei. Am dezvoltat o pasiune profund\u0103 pentru \u00een\u021belegerea proceselor emo\u021bionale, a identit\u0103\u021bii feminine \u0219i materne, pentru reglarea emo\u021bional\u0103 \u0219i reconectarea cu sinele autentic.\n\nCred cu t\u0103rie c\u0103 atunci c\u00e2nd mama este echilibrat\u0103 interior, \u00eentreaga familie beneficiaz\u0103 de stabilitate \u0219i siguran\u021b\u0103 emo\u021bional\u0103.\n\n\u00cen cadrul acestui proiect, voi sus\u021bine clase dedicate mamelor care au nevoie de sus\u021binere, claritate \u0219i echilibrare emo\u021bional\u0103 \u00een primii ani de m\u0103micie, dar \u0219i \u00een etapele ulterioare \u00een care simt c\u0103 doar \u201efac fa\u021b\u0103\u201d, f\u0103r\u0103 s\u0103 se mai bucure cu adev\u0103rat de rolul lor.\n\nSesiunile mele vor fi concepute pentru a ajuta mamele s\u0103 \u00ee\u0219i \u00een\u021beleag\u0103 emo\u021biile, s\u0103 \u00ee\u0219i regleze st\u0103rile de cople\u0219ire, s\u0103 \u00ee\u0219i redefineasc\u0103 identitatea \u0219i s\u0103 \u00ee\u0219i rec\u00e2\u0219tige \u00eencrederea \u00een sine.\n\nVom lucra at\u00e2t la nivel mental (mindset), c\u00e2t \u0219i emo\u021bional \u0219i rela\u021bional.\n\nVoi aborda subiecte precum:\n\nBaby blues, depresia postnatal\u0103 \u0219i anxietatea matern\u0103\n\nEpuizarea \u0219i burnout-ul parental\n\nVinov\u0103\u021bia mamei \u0219i perfec\u021bionismul matern\n\nTeama de a gre\u0219i \u0219i presiunea \u201emamei perfecte\u201d\n\nImaginea de sine dup\u0103 na\u0219tere \u0219i transform\u0103rile din primii 2 ani\n\nCompararea cu alte mame \u0219i impactul social media\n\nIdentificarea tipologiei proprii de mam\u0103 \u0219i influen\u021ba acesteia asupra copilului \u0219i rela\u021biei de cuplu\n\nConflictul dintre roluri: mam\u0103 \u2013 so\u021bie \u2013 profesionist\u0103\n\nReg\u0103sirea voca\u021biei \u0219i reintegrarea profesional\u0103\n\nNoua identitate de mam\u0103 \u0219i integrarea ei \u00eentr-un mod s\u0103n\u0103tos \u0219i con\u0219tient\n\nScopul meu este ca fiecare mam\u0103 s\u0103 plece din aceste clase cu mai mult\u0103 claritate, mai mult\u0103 bl\u00e2nde\u021be fa\u021b\u0103 de sine \u0219i instrumente concrete de reglare emo\u021bional\u0103 \u0219i reconectare interioar\u0103.\n\nSunt recunosc\u0103toare pentru aceast\u0103 oportunitate de a contribui la dezvoltarea comunit\u0103\u021bii G\u00e2nde\u0219te & C\u00e2\u0219tig\u0103 Diferit \u0219i cred profund c\u0103 atunci c\u00e2nd sus\u021binem mama, sus\u021binem genera\u021biile viitoare.\n\nV\u0103 invit s\u0103 v\u0103 al\u0103tura\u021bi sesiunilor mele cu deschidere \u0219i curaj, s\u0103 aduce\u021bi \u00eentreb\u0103ri, fr\u0103m\u00e2nt\u0103ri, experien\u021be personale \u2013 pentru c\u0103 transformarea real\u0103 \u00eencepe din dialog autentic \u0219i din asumare con\u0219tient\u0103.\n\nV\u0103 mul\u021bumesc \u0219i abia a\u0219tept s\u0103 ne \u00eent\u00e2lnim.\n\n\u00cenregistr\u0103ri Clase Online\nDate de contact","c":{"web":"alicemacrina.ro","fb":"alicemacrina.cornea.3","ig":"alice.macrina","wa":"40747454711"},"img":["https://d1yei2z3i6k35z.cloudfront.net/12980838/699581bd93b5e_GCDEvenimente1.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfda7c7fe_3.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe96ecd1_7.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1bfe5c43ce_6.png","https://d1yei2z3i6k35z.cloudfront.net/3270029/67a1c54a9cde6_8.png"]}};

function tcHTML(id){

function tpHTML(id){
  const t=IX[id];if(!t)return"";
  const[n,tp,b,vc,td]=t;
  const det=DE[id]||{};
  const dx=det.d||"";
  const co=det.c||{};
  const pdfs=co.pdfUrls||[];
  const soc=Object.entries(co).filter(([k,v])=>k!=="pdf"&&k!=="pdfUrls"&&typeof v==="string"&&SC[k]);
  const vids=VI[id]||[];
  
  let h="";
  if(b) h+=`<div style="width:100%;aspect-ratio:16/9;overflow:hidden"><img src="${b}" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>`;
  h+=`<div style="padding:16px">`;
  h+=`<h2 style="font-size:20px;font-weight:800;color:${P.nv};margin:0 0 4px">${n}</h2>`;
  h+=`<p style="font-size:14px;color:${P.tl};margin:0 0 12px;font-weight:600">${tp}</p>`;
  // Stats
  h+=`<div style="display:flex;gap:12px;margin-bottom:16px"><div style="flex:1;background:${P.tg};border-radius:12px;padding:10px 12px;text-align:center"><div style="font-size:18px;font-weight:800;color:${P.tl}">${vc}</div><div style="font-size:11px;color:${P.lt}">videouri</div></div><div style="flex:1;background:${P.tg};border-radius:12px;padding:10px 12px;text-align:center"><div style="font-size:18px;font-weight:800;color:${P.tl}">${fm(td)}</div><div style="font-size:11px;color:${P.lt}">conținut</div></div></div>`;
  // Description
  if(dx){
    const short=dx.length>300?dx.substring(0,300)+"...":dx;
    h+=`<div style="margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;color:${P.nv};margin:0 0 8px">Despre</h3>`;
    h+=`<p id="desc-text" style="font-size:13px;line-height:1.6;color:${P.tx};margin:0;white-space:pre-line">${short.replace(/</g,"&lt;")}</p>`;
    if(dx.length>300) h+=`<button data-action="toggle-desc" data-full="${encodeURIComponent(dx)}" data-short="${encodeURIComponent(short)}" data-expanded="0" style="background:none;border:none;color:${P.tl};font-size:13px;font-weight:600;padding:6px 0;margin-top:4px">Citește tot ▼</button>`;
    h+=`</div>`;
  }
  // Social
  if(soc.length>0){
    h+=`<div style="margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;color:${P.nv};margin:0 0 8px">Contact & Social Media</h3><div style="display:flex;flex-wrap:wrap;gap:8px">`;
    soc.forEach(([k,v])=>{const s=SC[k];const fv=v.split(",")[0];h+=`<a href="${s.u(fv)}" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;gap:6px;padding:8px 12px;background:${P.tg};border-radius:10px;text-decoration:none;color:${P.nv};font-size:13px;font-weight:600"><span>${s.i}</span> ${s.l}</a>`;});
    h+=`</div></div>`;
  }
  // PDFs
  if(pdfs.length>0){
    h+=`<div style="margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;color:${P.nv};margin:0 0 8px">📄 Materiale utile</h3>`;
    pdfs.forEach((u,i)=>{
      let fn=u.split("/").pop().split("_").slice(1).join("_").replace(/\.pdf$/i,"").replace(/([A-Z])/g," $1").trim()||("Material "+(i+1));
      h+=`<a href="${u}" target="_blank" rel="noopener noreferrer" style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:${P.cd};border:1px solid ${P.bd};border-radius:10px;margin-bottom:6px;font-size:13px;color:${P.tl};text-decoration:none;font-weight:600"><span style="font-size:18px">📎</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fn}</span><span style="font-size:12px;color:${P.lt}">↗</span></a>`;
    });
    h+=`</div>`;
  }
  // Videos
  if(vids.length>0){
    h+=`<div style="margin-bottom:16px"><h3 style="font-size:14px;font-weight:700;color:${P.nv};margin:0 0 10px">🎬 Clase (${vids.length})</h3><div class="scroll-h">`;
    vids.forEach((v,i)=>{
      h+=`<button data-action="video" data-vidx="${i}" style="flex-shrink:0;width:280px;scroll-snap-align:start;border:none;background:transparent;padding:0">
      <div style="width:280px;height:158px;border-radius:12px;overflow:hidden;position:relative;background:#1a1a2e">
      <img src="https://vumbnail.com/${v[0]}.jpg" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><div style="width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center"><span style="font-size:18px;margin-left:3px;color:${P.nv}">▶</span></div></div>
      <span style="position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,0.75);color:#fff;font-size:11px;padding:3px 7px;border-radius:6px;font-weight:600">${fm(v[3])}</span>
      </div></button>`;
    });
    h+=`</div></div>`;
  }
  h+=`</div>`;
  return h;
}

function videoHTML(){
  const{ti,vi,viIdx}=state;
  const vids=VI[ti]||[];
  const v=vi;
  const ci=viIdx;
  const pv=ci>0?ci-1:-1;
  const nv=ci<vids.length-1?ci+1:-1;
  let h=`<div style="position:relative;padding-top:56.25%;background:#000"><iframe src="https://player.vimeo.com/video/${v[0]}?h=${v[1]}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none" allow="autoplay;fullscreen;picture-in-picture" allowfullscreen></iframe></div>`;
  h+=`<div style="padding:16px"><h3 style="font-size:16px;font-weight:700;color:${P.tx};margin:0 0 6px">${v[2].replace(/</g,"&lt;")}</h3>`;
  h+=`<p style="font-size:13px;color:${P.lt};margin:0 0 16px">${fm(v[3])} · ${ci+1}/${vids.length}</p>`;
  h+=`<div style="display:flex;gap:10px">`;
  if(pv>=0) h+=`<button data-action="video" data-vidx="${pv}" style="flex:1;padding:12px;border-radius:12px;border:1px solid ${P.bd};background:${P.cd};font-size:13px;font-weight:600;color:${P.tx}">← Anterior</button>`;
  if(nv>=0) h+=`<button data-action="video" data-vidx="${nv}" style="flex:1;padding:12px;border-radius:12px;border:1px solid ${P.bd};background:${P.cd};font-size:13px;font-weight:600;color:${P.tx}">Următorul →</button>`;
  h+=`</div></div>`;
  return h;
}

function bindEvents(){
  // Login
  const lb=$("login-btn");
  if(lb){
    const ei=$("email-input");
    lb.onclick=()=>{
      const e=ei.value.trim().toLowerCase();
      if(!e)return;
      if(ME[e]!==undefined){state.au=true;state.un=ME[e]||e.split("@")[0];render();}
      else{const err=$("login-err");err.textContent="Email negăsit.";err.style.display="block";}
    };
    ei.onkeydown=e=>{if(e.key==="Enter")lb.click();};
  }
  // Search
  const si=$("search-input");
  if(si){si.oninput=()=>{state.q=si.value;render();setTimeout(()=>{const s=$("search-input");if(s){s.focus();s.setSelectionRange(s.value.length,s.value.length);}},0);};}
  // All buttons with data-action
  document.querySelectorAll("[data-action]").forEach(btn=>{
    const action=btn.dataset.action;
    btn.onclick=()=>{
      if(action==="cat"){state.ct=CA[+btn.dataset.idx];state.w="c";render();}
      else if(action==="trainer"){state.ti=btn.dataset.id;state.w="t";state.vi=null;render();window.scrollTo(0,0);}
      else if(action==="video"){
        const idx=+btn.dataset.vidx;
        const vids=VI[state.ti]||[];
        state.vi=vids[idx];state.viIdx=idx;state.w="v";render();window.scrollTo(0,0);
      }
      else if(action==="back"){
        if(state.w==="v"){state.w="t";state.vi=null;}
        else if(state.w==="t"){state.w=state.ct?"c":"h";state.ti=null;}
        else{state.w="h";state.ct=null;}
        render();
      }
      else if(action==="toggle-desc"){
        const exp=btn.dataset.expanded==="1";
        const txt=$("desc-text");
        if(exp){txt.textContent=decodeURIComponent(btn.dataset.short);btn.textContent="Citește tot ▼";btn.dataset.expanded="0";}
        else{txt.textContent=decodeURIComponent(btn.dataset.full);btn.textContent="Mai puțin ▲";btn.dataset.expanded="1";}
      }
    };
  });
}

render();
</script></body></html>
